<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sedy ERP</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="manifest" href="manifest.json">

  <link rel="manifest"
    href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Sedy%20ERP%22%2C%22short_name%22%3A%22Sedy%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f8fafc%22%2C%22theme_color%22%3A%22%232563eb%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F5609%2F5609352.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

  <!-- أضف هذا داخل الـ head -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sedy ERP">
  <!-- تعريف الأيقونة للتثبيت -->
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5609/5609352.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet">

  <!-- Firebase & Charts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#2563eb', // Blue-600
              soft: '#eff6ff',
            },
            slate: {
              50: '#f8fafc',
              100: '#f1f5f9',
              800: '#1e293b',
              900: '#0f172a',
            }
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '2rem',
          }
        }
      }
    }
  </script>

  <!-- =========================================================
     INTERNAL CSS — Design System
========================================================= -->
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #0ea5e9;
      --primary-2: #0284c7;
      --primary-soft: #e0f2fe;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #6366f1;
      --shadow: 0 4px 14px rgba(15, 23, 42, .06);
      --shadow-lg: 0 10px 30px rgba(15, 23, 42, .12);
      --radius: 14px;
      --sidebar-w: 260px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    body {
      overscroll-behavior-y: contain;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .sidebar-drawer {
      transition: transform 0.3s ease-in-out;
      transform: translateX(100%);
      /* للـ RTL */
    }

    .sidebar-drawer.open {
      transform: translateX(0);
    }

    /* Bottom Navigation Bar للموبايل فقط */
    .mobile-nav {
      padding-bottom: env(safe-area-inset-bottom);
    }

    .soft-ui-card {
      background: #ffffff;
      border: 1px solid #f1f5f9;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      border-radius: 2rem;
    }

    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(241, 245, 249, 1);
    }

    /* تحسين شكل السكرول بار */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }

    html.dark {
      --bg: #0b1220;
      --surface: #111a2e;
      --surface-2: #0f1729;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #1f2a44;
      --primary: #38bdf8;
      --primary-2: #0ea5e9;
      --primary-soft: #0c2740;
      --shadow: 0 4px 14px rgba(0, 0, 0, .4);
      --shadow-lg: 0 10px 30px rgba(0, 0, 0, .5);
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cairo', 'Inter', system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased
    }

    html[dir="ltr"] body {
      font-family: 'Inter', 'Cairo', system-ui, sans-serif
    }

    a {
      color: inherit;
      text-decoration: none
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit
    }

    /* تنسيقات معرض الصور والزوم */
    .product-gallery {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .main-img-container {
      width: 100%;
      height: 300px;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      position: relative;
      cursor: zoom-in;
    }

    .main-img-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .main-img-container:hover img {
      transform: scale(1.8);
    }

    /* قوة الزوم */

    .thumb-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 5px 0;
    }

    .thumb-item {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      object-fit: cover;
    }

    .thumb-item.active {
      border-color: var(--primary);
    }

    /* زر السلة العائم للموبايل */
    .floating-cart {
      position: fixed;
      bottom: 85px;
      inset-inline-end: 20px;
      background: var(--success);
      color: #fff;
      padding: 12px 20px;
      border-radius: 30px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      z-index: 40;
      cursor: pointer;
    }

    input,
    select,
    textarea {
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      width: 100%;
      outline: none;
      transition: .2s
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft)
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px
    }

    /* Layout */
    .app {
      display: flex;
      min-height: 100vh
    }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-inline-end: 1px solid var(--border);
      position: fixed;
      inset-block: 0;
      inset-inline-start: 0;
      display: flex;
      flex-direction: column;
      transition: .3s;
      z-index: 50
    }

    html[dir="ltr"] .sidebar {
      border-inline-end: 1px solid var(--border);
      border-inline-start: none
    }

    .sidebar .brand {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border)
    }

    .sidebar .brand .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--info));
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900
    }

    .sidebar .brand .name {
      font-weight: 900;
      font-size: 16px
    }

    .sidebar .nav {
      flex: 1;
      overflow: auto;
      padding: 12px
    }

    .sidebar .nav .group {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 14px 12px 6px;
      font-weight: 700
    }

    .sidebar .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 2px;
      transition: .2s;
      font-size: 13.5px
    }

    .sidebar .nav a:hover {
      background: var(--surface-2);
      color: var(--text)
    }

    .sidebar .nav a.active {
      background: var(--primary-soft);
      color: var(--primary-2)
    }

    .sidebar .nav a .ico {
      width: 20px;
      text-align: center
    }

    .sidebar .user {
      padding: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px
    }

    .sidebar .user .av {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800
    }

    .main {
      flex: 1;
      margin-inline-start: var(--sidebar-w);
      min-width: 0
    }

    html[dir="ltr"] .main {
      margin-inline-start: var(--sidebar-w);
      margin-inline-end: 0
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .topbar h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800
    }

    .topbar .spacer {
      flex: 1
    }

    .topbar .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--surface-2);
      display: grid;
      place-items: center;
      color: var(--text);
      position: relative
    }

    .topbar .icon-btn .badge {
      position: absolute;
      top: 4px;
      inset-inline-start: 4px;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 5px
    }

    .menu-toggle {
      display: none
    }

    .content {
      padding: 20px;
      max-width: 1500px;
      margin: auto
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px
    }

    .card h3 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 800
    }

    .grid {
      display: grid;
      gap: 16px
    }

    .grid.cols-4 {
      grid-template-columns: repeat(4, 1fr)
    }

    .grid.cols-3 {
      grid-template-columns: repeat(3, 1fr)
    }

    .grid.cols-2 {
      grid-template-columns: repeat(2, 1fr)
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: .25s
    }

    .kpi:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg)
    }

    .kpi .ic {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 22px;
      color: #fff
    }

    .kpi .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600
    }

    .kpi .value {
      font-size: 22px;
      font-weight: 900;
      margin-top: 2px
    }

    .kpi .delta {
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px
    }

    .kpi .delta.up {
      color: var(--success)
    }

    .kpi .delta.down {
      color: var(--danger)
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13.5px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      transition: .2s
    }

    .btn:hover {
      transform: translateY(-1px)
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      border: none;
      box-shadow: 0 4px 12px rgba(14, 165, 233, .35)
    }

    .btn.success {
      background: var(--success);
      color: #fff;
      border: none
    }

    .btn.danger {
      background: var(--danger);
      color: #fff;
      border: none
    }

    .btn.ghost {
      background: transparent
    }

    .btn.sm {
      padding: 6px 10px;
      font-size: 12px
    }

    /* Tables */
    .table-wrap {
      overflow: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface)
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px
    }

    th,
    td {
      padding: 12px 14px;
      text-align: start;
      border-bottom: 1px solid var(--border);
      font-size: 13px
    }

    th {
      background: var(--surface-2);
      font-weight: 800;
      color: var(--muted);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    tbody tr:hover {
      background: var(--surface-2)
    }

    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700
    }

    .tag.pending {
      background: #fef3c7;
      color: #92400e
    }

    .tag.processing {
      background: #dbeafe;
      color: #1e40af
    }

    .tag.packed {
      background: #ede9fe;
      color: #5b21b6
    }

    .tag.shipped {
      background: #cffafe;
      color: #155e75
    }

    .tag.delivered {
      background: #d1fae5;
      color: #065f46
    }

    .tag.returned {
      background: #fee2e2;
      color: #991b1b
    }

    .tag.cancelled {
      background: #e2e8f0;
      color: #334155
    }

    html.dark .tag {
      filter: brightness(.85) saturate(1.3)
    }

    /* Modals */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px
    }

    .modal-bg.open {
      display: flex;
      animation: fade .2s
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow: auto;
      padding: 22px;
      box-shadow: var(--shadow-lg);
      animation: pop .25s
    }

    .modal h2 {
      margin: 0 0 16px;
      font-size: 18px
    }

    .modal .row {
      margin-bottom: 12px
    }

    .modal .row label {
      display: block;
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 6px;
      color: var(--muted)
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px
    }

    .qty-auto-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--surface-2);
      padding: 8px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .qty-btn-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .qty-btn-circle:hover {
      transform: scale(1.1);
      background: var(--primary-2);
    }

    .qty-btn-circle.minus {
      background: var(--muted);
    }

    .qty-val {
      font-weight: 800;
      font-size: 16px;
      min-width: 25px;
      text-align: center;
    }

    .mobile-drawer {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
    }

    @media (max-width: 1024px) {
      .sidebar-closed {
        transform: translateX(100%);
      }

      /* للغة العربية */
      html[dir="ltr"] .sidebar-closed {
        transform: translateX(-100%);
      }
    }

    /* تحسين شكل الهيدر في الموبايل */
    header {
      padding-top: calc(0.5rem + var(--safe-top));
    }

    @keyframes fade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(.95)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    /* Toast */
    .toast-host {
      position: fixed;
      bottom: 20px;
      inset-inline-start: 20px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      box-shadow: var(--shadow-lg);
      font-weight: 600;
      animation: slide .25s;
      border-inline-start: 4px solid var(--primary)
    }

    .toast.success {
      border-color: var(--success)
    }

    .toast.danger {
      border-color: var(--danger)
    }

    .toast.warning {
      border-color: var(--warning)
    }

    @keyframes slide {
      from {
        transform: translateY(20px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    /* Login */
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
      padding: 20px
    }

    .login-card {
      background: var(--surface);
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      padding: 32px;
      box-shadow: var(--shadow-lg)
    }

    .login-card .logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--info));
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      font-size: 22px
    }

    .login-card h1 {
      margin: 0 0 6px;
      text-align: center;
      font-size: 22px
    }

    .login-card p {
      margin: 0 0 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px
    }

    .role-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
      justify-content: center
    }

    .role-chips button {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      font-size: 11px;
      font-weight: 700
    }

    /* FAB */
    .fab {
      display: none;
      position: fixed;
      bottom: 20px;
      inset-inline-end: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--info));
      color: #fff;
      font-size: 24px;
      box-shadow: var(--shadow-lg);
      z-index: 30;
      align-items: center;
      justify-content: center
    }

    /* Mobile */
    @media(max-width:980px) {
      .grid.cols-4 {
        grid-template-columns: repeat(2, 1fr)
      }

      .grid.cols-3 {
        grid-template-columns: 1fr
      }

      .grid.cols-2 {
        grid-template-columns: 1fr
      }
    }

    @media(max-width:768px) {
      .sidebar {
        transform: translateX(-100%);
        box-shadow: var(--shadow-lg)
      }

      html[dir="ltr"] .sidebar {
        transform: translateX(-100%)
      }

      html[dir="rtl"] .sidebar {
        transform: translateX(-100%)
      }

      .sidebar.open {
        transform: translateX(0)
      }

      .main {
        margin: 0 !important
      }

      .menu-toggle {
        display: grid
      }

      .fab {
        display: flex
      }

      .grid.cols-4 {
        grid-template-columns: 1fr 1fr
      }

      .content {
        padding: 14px
      }
    }

    .search-box {
      position: relative;
      flex: 1;
      max-width: 380px
    }

    .search-box input {
      padding-inline-start: 38px
    }

    .search-box .ico {
      position: absolute;
      top: 50%;
      inset-inline-start: 12px;
      transform: translateY(-50%);
      color: var(--muted)
    }

    /* ===========================================================
       4. AUTHENTICATION
    =========================================================== */
    const Auth = {
      /* استبدل دالة login داخل كائن Auth بهذا الكود */

      login(email, pass) {
        const u = State.data.users.find(x => x.email === email && x.pass === pass);
        if (!u) return null;

        State.user = u;

        // --- منطق التوجيه الذكي المطور ---

        if (u.role === 'super_admin') {
          // المدير العام يفتح دائماً على لوحة التحكم
          State.page = 'dashboard';
        }
        else if (u.allowedPages && u.allowedPages.length > 0) {
          // الموظف يفتح على أول صفحة تم تحديدها له في الصلاحيات
          // مثال: إذا كانت أول صفحة مسموحة له هي "الطلبات"، سيفتح عليها مباشرة
          State.page = u.allowedPages[0];
        }
        else {
          // إذا لم يتم تحديد صفحات مخصصة، نعود للصلاحيات الافتراضية للدور (Role)
          const r = ROLES[u.role];
          if (r.pages === '*') {
            State.page = 'dashboard';
          } else if (Array.isArray(r.pages) && r.pages.length > 0) {
            State.page = r.pages[0];
          } else {
            // حالة احتياطية إذا لم يوجد أي شيء
            State.page = 'shop';
          }
        }

        // حفظ الجلسة وتسجيل النشاط
        localStorage.setItem('session', JSON.stringify({ id: u.id, t: now() }));
        log(u.email, 'تسجيل دخول وتوجيه لصفحة: ' + State.page);

        return u;
      },
      logout() { State.user = null; State.page = 'shop'; localStorage.removeItem('session'); render(); },
      restore() {
        try {
          const s = JSON.parse(localStorage.getItem('session'));
          if (s) { State.user = State.data.users.find(u => u.id === s.id); }
        } catch (e) { }
      },
      can(page) {
        // 1. الصفحات العامة: تظهر دائماً للكل (زائر أو مستخدم)
        if (['shop', 'cart'].includes(page)) return true;

        // 2. إذا لم يكن هناك تسجيل دخول، لا تظهر باقي الصفحات
        if (!State.user) return false;

        // 3. المدير العام (super_admin) يرى كل شيء دائماً
        if (State.user.role === 'super_admin') return true;

        // 4. باقي المستخدمين: حسب الصفحات المحددة لهم
        return State.user.allowedPages && State.user.allowedPages.includes(page);
      }

    function render() {
      try {
        document.documentElement.classList.toggle('dark', State.theme === 'dark');
        document.documentElement.dir = State.lang === 'ar' ? 'rtl' : 'ltr';
        const root = document.getElementById('app-root');

        // منع مسح الهيكل بالكامل إذا كان موجوداً بالفعل (لتحسين الأداء)
        const currentShell = State.user ? 'admin' : 'public';
        const activeShell = root.dataset.shell;

        if (activeShell !== currentShell) {
          root.innerHTML = State.user ? AppShell() : PublicShell();
          root.dataset.shell = currentShell;
          if (State.user) bindShell(); // ربط أحداث القائمة الجانبية
        }

        // رسم محتوى الصفحة الداخلية
        renderPage();

        // تشغيل الأيقونات
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      } catch (error) {
        console.error("Render Error:", error);
      }
    }

        const links = items.map(i => {

          return `

    // 4. استيراد ملف Excel المطور (يدعم العربي 100%)
    window.importExcelProducts = (input) => {
      const file = input.files[0];
      if (!file) return;

      toast('جاري قراءة البيانات العربية...', 'info');

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const worksheet = workbook.Sheets[workbook.SheetNames[0]];
          const jsonData = XLSX.utils.sheet_to_json(worksheet);

          let added = 0;
          jsonData.forEach(row => {
            const find = (keys) => {
              const key = Object.keys(row).find(k => keys.includes(k.trim()));
              return key ? row[key] : null;
            };

            const name = find(['الاسم', 'المنتج', 'name']);
            if (name) {
              State.data.products.push({
                id: uid(),
                name: String(name),
                sku: String(find(['sku', 'كود', 'code']) || uid()),
                cat: 'c1', // تصنيف افتراضي
                cost: parseFloat(find(['التكلفة', 'cost', 'سعر التكلفة'])) || 0,
                price: parseFloat(find(['السعر', 'price', 'سعر البيع'])) || 0,
                weight: parseFloat(find(['الوزن', 'weight', 'وزن القطعة'])) || 0,
                isAvailable: find(['متوفر', 'الحالة'])?.toString().includes('نعم') || true,
                shortDesc: find(['وصف مختصر', 'وصف', 'description']) || '',
                stock: parseInt(find(['المخزون', 'stock', 'الكمية'])) || 0,
                images: []
              });
              added++;
            }
          });

          Store.save(); render();
          toast(`تمت إضافة ${added} منتج للقائمة بنجاح ✅`, 'success');
        } catch (err) { toast('فشل الاستيراد.. تأكد من تنسيق الملف', 'danger'); }
      };
      reader.readAsArrayBuffer(file);
      input.value = '';
    };

    // --- 3. استيراد منتجات من ملف (إضافة للموجود) ---
    window.importProductsCSV = (input) => {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const lines = e.target.result.split('\n').filter(l => l.trim());
        let added = 0;
        lines.slice(1).forEach(line => {
          const c = line.split(',').map(v => v.replace(/"/g, '').trim());
          if (!c[0]) return;
          State.data.products.push({
            id: uid(), name: c[0], sku: c[1] || uid(), weight: c[2] || 0,
            isAvailable: c[3] !== 'false', description: c[4] || '',
            cost: Number(c[5]) || 0, price: Number(c[6]) || 0, stock: Number(c[7]) || 0, cat: 'c1'
          });
          added++;
        });
        Store.save(); render(); toast(`تمت إضافة ${added} منتج جديد للقائمة ✅`, 'success');
      };
      reader.readAsText(file, 'UTF-8');
    };

    function renderPosList() {

      if (it) {
        it.qty += delta;

        if (it.qty <= 0) {
          cart = cart.filter(c => c.pid !== pid);

          toast(delta > 0 ? `تمت إضافة ${p.name}` : `تم تقليل ${p.name}`, delta > 0 ? 'success' : 'info');

      const address = document.getElementById('cusAddress')?.value || '';

      // التأكد من قراءة العربون كرقـم (parseFloat)
      const depositInput = document.getElementById('posDeposit');
      const depositValue = depositInput ? parseFloat(depositInput.value) : 0;

      // 2. إيجاد أو إنشاء العميل
      let cu = State.data.customers.find(x => x.phone === phone && phone !== '');
      if (!cu && phone !== '') {
        cu = { id: uid(), name, phone, gov, address, points: 0, total: 0 };
        State.data.customers.push(cu);
      }

      const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
      const ship = 50;
      const grandTotal = sub + ship;

      // 3. إنشاء كائن الطلب مع المبالغ الصحيحة
      const order = {
        id: uid(),
        code: 'ORD-' + (1000 + State.data.orders.length + 1),
        customerId: cu ? cu.id : null,
        items: cart.map(c => ({ pid: c.pid, qty: c.qty, price: c.price })),
        total: grandTotal,
        status: 'pending',
        gov,
        address,
        shipping: ship,
        date: now(),
        sellerName: State.user ? State.user.name : 'متجر أونلاين',
        salesmanId: State.user ? State.user.id : 'system',
        // حفظ المبلغ المدفوع (عربون) والمتبقي
        paid: depositValue,
        remaining: grandTotal - depositValue
      };

      // 4. تحديث المخزون
      cart.forEach(item => {
        const p = State.data.products.find(x => x.id === item.pid);
        if (p) p.stock -= item.qty;
      });

      // 5. حفظ وتصفير السلة
      State.data.orders.unshift(order);
      cart = [];
      Store.save();

      toast(`تم حفظ الطلب بنجاح.. المدفوع: ${money(depositValue)}`, 'success');
      render();
    }

    function exportCustomersExcel() {
      const headers = ['كود العميل', 'الإسم', 'تليفون', 'تليفون إضافي', 'المحافظة', 'العنوان', 'إجمالي المشتريات', 'نقاط الولاء', 'تصنيف العميل'];
      const rows = State.data.customers.map(c => [
        c.code || '', c.name, c.phone || '', c.phone2 || '', c.gov || '', c.address || '', c.total || 0, c.points || 0, c.category || 'جديد'
      ]);

      const csvContent = "\ufeff" + [headers.join(','), ...rows.map(r => r.map(v => `"${v}"`).join(','))].join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'قائمة_العملاء.csv'; a.click();
    }

    function importCustomersExcel(input) {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const lines = e.target.result.split('\n').filter(l => l.trim());
        let imported = 0;
        lines.slice(1).forEach(line => {
          const cols = line.split(',').map(c => c.replace(/"/g, '').trim());
          if (!cols[1]) return; // يجب وجود الاسم

          const customerData = {
            id: uid(),
            code: cols[0] || ('CUS-' + (State.data.customers.length + imported + 1000)),
            name: cols[1],
            phone: cols[2] || '',
            phone2: cols[3] || '',
            gov: cols[4] || 'القاهرة',
            address: cols[5] || '',
            total: parseFloat(cols[6]) || 0,
            points: parseInt(cols[7]) || 0,
            category: cols[8] || 'جديد'
          };

          // إذا كان العميل موجوداً (برقم الهاتف)، قم بتحديثه
          const existing = State.data.customers.find(x => x.phone === customerData.phone && customerData.phone !== '');
          if (existing) Object.assign(existing, customerData);
          else { State.data.customers.push(customerData); imported++; }
        });
        Store.save(); render(); toast(`تم تحديث البيانات واستيراد ${imported} عملاء جدد ✅`, 'success');
      };
      reader.readAsText(file, 'UTF-8');
    }

            <div id="calcComparison" class="space-y-3">

    window.runShippingCalc = () => {
      const coId = document.getElementById('calcShipCo')?.value;
      const weight = parseFloat(document.getElementById('calcShipWeight')?.value) || 0;
      const companies = State.data.shippingCompanies || [];
      const resultDiv = document.getElementById('calcShipResult');
      const compareDiv = document.getElementById('calcComparison');

      if (!coId) return;

      const sc = companies.find(x => x.id === coId);
      if (!sc) return;

      // منطق الحساب: (أول 2 كيلو بالسعر الأساسي + الزيادة لكل كيلو إضافي)
      const extraKg = Math.max(0, weight - 2);
      const extraCost = extraKg * sc.extraKgPrice;
      const total = sc.basePrice + extraCost;

      // عرض النتيجة الرئيسية
      resultDiv.innerHTML = `
    <div class="bg-blue-50 rounded-3xl p-6 border border-blue-100 animate-pop">
        <div class="flex justify-between items-center mb-4">
            <span class="text-blue-600 font-black text-sm uppercase">التكلفة الإجمالية</span>

        <div class="flex items-center gap-2 text-slate-400 text-xs font-bold">
            <i data-lucide="info" class="w-3 h-3"></i>
            أساسي: ${money(sc.basePrice)} + وزن زائد: ${money(extraCost)}
        </div>
    </div>`;

      // عرض المقارنة مع الشركات الأخرى
      const otherCos = companies.filter(x => x.id !== coId);
      compareDiv.innerHTML = otherCos.map(osc => {
        const oExtraKg = Math.max(0, weight - 2);
        const oTotal = osc.basePrice + (oExtraKg * osc.extraKgPrice);
        const diff = oTotal - total;

        return `
    <div class="flex justify-between items-center bg-white/10 p-4 rounded-2xl backdrop-blur-sm">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 rounded-full ${diff > 0 ? 'bg-red-400' : 'bg-green-400'}"></div>
            <span class="font-bold text-sm text-blue-50">${osc.name}</span>
        </div>
        <div class="text-right">
            <div class="font-black text-sm">${money(oTotal)}</div>
            <div class="text-[9px] ${diff > 0 ? 'text-red-200' : 'text-green-200'} font-bold">
                ${diff > 0 ? '+' : ''}${money(diff)} فرق السعر
            </div>
        </div>
    </div>`;
      }).join('') || '<p class="text-blue-200 text-xs">لا توجد شركات أخرى للمقارنة</p>';

      if (typeof lucide !== 'undefined') lucide.createIcons();
    };

      const exp = State.data.expenses.reduce((s, e) => s + e.amount, 0);
      const profit = sales - cogs - exp;
      return `<div class="grid cols-4 mb">

    ${kpi('📦', 'تكلفة البضاعة', money(cogs), '-', 'up', '#0ea5e9')}
    ${kpi('💸', 'المصروفات', money(exp), '-', 'down', '#ef4444')}

    function renderCommissions() {
      const repId = document.getElementById('commRep')?.value || '';
      const status = document.getElementById('commStatus')?.value || '';

      // تصفية المستخدمين المسموح لهم بالبيع
      const sellers = State.data.users.filter(u =>

      const rows = sellers.map(s => {

        let ords = State.data.orders.filter(o => o.salesmanId === s.id || o.salesman === s.id);

        // فلترة الطلبات بناءً على الحالة المختارة
        if (status) ords = ords.filter(o => o.status === status);

        const totalSales = ords.reduce((sum, o) => sum + o.total, 0);
        const commPercent = s.commission || 5; // نسبة افتراضية 5% إذا لم تحدد
        const commValue = (totalSales * commPercent) / 100;

        return { s, count: ords.length, totalSales, commPercent, commValue };

    window.addToCartFromDetail = (pid) => {
      const qty = parseInt(document.getElementById('detailQty').value || 1);
      const p = State.data.products.find(x => x.id === pid);
      const it = cart.find(c => c.pid === pid);
      if (it) it.qty += qty; else cart.push({ pid, name: p.name, price: p.price, qty });
      closeModal();
      toast('تمت الإضافة للسلة', 'success');
      render(); // لتحديث العداد في الصفحة الرئيسية
    };

    /* ===========================================================
       23. BOOTSTRAP
    =========================================================== */
    // بدلاً من السطر القديم، استخدم هذا:
    Store.load().then(() => {
      Auth.restore();
      render();
    });

    /* PWA service worker registration (inline) */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => console.log('App Ready ✅'));
      });
    }

    /* Firebase placeholder — when you add real config:
       import { initializeApp } from 'firebase/app';
       import { getAuth, ... } from 'firebase/auth';
       import { getFirestore, onSnapshot, ... } from 'firebase/firestore';
       const app = initializeApp(FIREBASE_CONFIG);
       ... wire onSnapshot to State.data and call render()
    */
    function showProductDetails(pid) {
      // البحث عن المنتج
      const p = State.data.products.find(x => x.id === pid);

      // إذا لم يجد المنتج، يظهر تنبيه ويغلق
      if (!p) {
        console.error("Product not found ID:", pid);
        toast("عذراً، تعذر تحميل بيانات المنتج", "danger");
        return;
      }

      // التأكد من وجود مصفوفة الصور
      const images = Array.isArray(p.images) ? p.images : [];
      const mainImgSrc = images.length > 0 ? images[0] : '';

      // إنشاء الصور المصغرة
      const thumbnailsHtml = images.map((img, i) => `
    <img src="${img}" class="thumb-item ${i === 0 ? 'active border-primary' : 'border-transparent'}" 
         style="width:60px; height:60px; object-fit:cover; border-radius:12px; cursor:pointer; border:2px solid;" 
         onclick="changeMainImg(this, '${img}')">
  `).join('');

      // جلب اسم التصنيف
      const catName = State.data.categories.find(c => c.id === p.cat)?.name || 'عام';

      // رسم المودال بتصميم SaaS
      modal(`
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-right" dir="rtl">
      <!-- معرض الصور -->
      <div class="space-y-4">
        <div class="main-img-container bg-slate-50 rounded-[2rem] overflow-hidden border border-slate-100 soft-shadow aspect-square flex items-center justify-center relative group" 
             onmousemove="zoomImg(event)" onmouseleave="resetZoom()">
          ${mainImgSrc ?
          `<img src="${mainImgSrc}" id="productMainImg" class="w-full h-full object-contain transition-transform duration-500">` :
          `<div class="text-8xl opacity-10">${p.img || '📦'}</div>`
        }
        </div>
        <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">${thumbnailsHtml}</div>
      </div>

      <!-- بيانات المنتج -->
      <div class="flex flex-col h-full">
        <div class="mb-2">
            <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest italic border border-blue-100">${catName}</span>
        </div>
        <h2 class="text-3xl font-black text-slate-800 mb-4">${p.name || 'منتج بدون اسم'}</h2>
        
        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-6">
            <p class="text-slate-500 text-sm leading-relaxed font-bold">${p.shortDesc || 'لا يوجد وصف متاح لهذا المنتج حالياً.'}</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white border border-slate-100 p-4 rounded-2xl soft-shadow text-center">
                <span class="text-[10px] text-slate-400 font-black block uppercase mb-1">الوزن</span>
                <span class="font-black text-slate-700">${p.weight || '0'} كجم</span>
            </div>
            <div class="bg-white border border-slate-100 p-4 rounded-2xl soft-shadow text-center">
                <span class="text-[10px] text-slate-400 font-black block uppercase mb-1">التوفر</span>
                <span class="font-black ${p.stock > 0 ? 'text-emerald-500' : 'text-red-500'}">${p.stock > 0 ? 'في المخزن' : 'نفد'}</span>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-slate-100 flex items-center justify-between">
            <div>
                <span class="text-[10px] text-slate-400 font-black block uppercase">السعر النهائي</span>
                <span class="text-3xl font-black text-blue-600">${money(p.price)}</span>
            </div>
            <button onclick="addToCartFromDetail('${p.id}')" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all flex items-center gap-2">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i> إضافة للسلة
            </button>
        </div>
      </div>
    </div>
  `);

      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    // وظيفة تبديل الصورة الرئيسية
    window.changeMainImg = (el, src) => {
      const mainImg = document.getElementById('productMainImg');
      if (mainImg) mainImg.src = src;
      document.querySelectorAll('.thumb-item').forEach(t => t.style.borderColor = 'transparent');
      el.style.borderColor = 'var(--primary)';
    };

    // وظيفة الزوم (Zoom)
    window.zoomImg = (e) => {
      const img = document.getElementById('productMainImg');
      if (!img) return;
      const { left, top, width, height } = e.currentTarget.getBoundingClientRect();
      const x = ((e.pageX - left - window.scrollX) / width) * 100;
      const y = ((e.pageY - top - window.scrollY) / height) * 100;
      img.style.transformOrigin = `${x}% ${y}%`;
      img.style.transform = "scale(2)";
    };

    window.resetZoom = () => {
      const img = document.getElementById('productMainImg');
      if (img) {
        img.style.transform = "scale(1)";
        img.style.transformOrigin = `center center`;
      }
    };

    window.addToCartFromDetail = (pid) => {
      const qty = parseInt(document.getElementById('detailQty').value || 1);
      const p = State.data.products.find(x => x.id === pid);
      const it = cart.find(c => c.pid === pid);
      if (it) it.qty += qty; else cart.push({ pid, name: p.name, price: p.price, qty });
      closeModal();
      toast('تمت الإضافة للسلة ✅', 'success');
      render();
    };

    window.updateAutoCart = (pid, delta) => {
      const p = State.data.products.find(x => x.id === pid);
      if (!p) return;

      let it = cart.find(c => c.pid === pid);

      if (it) {
        it.qty += delta;
        if (it.qty <= 0) {
          cart = cart.filter(c => c.pid !== pid);
        }
      } else if (delta > 0) {
        cart.push({ pid: p.id, name: p.name, price: p.price, qty: 1 });
      }

      // حفظ وتحديث الواجهة فوراً
      Store.save();
      renderShop(); // نقوم بتحديث جزء المتجر فقط ليكون أسرع من تحديث التطبيق بالكامل

      // إذا أردت تحديث عداد السلة في التوب بار أيضاً:
      const cartBadge = document.querySelector('.topbar .badge');
      if (cartBadge) {
        const total = cart.reduce((s, c) => s + c.qty, 0);
        cartBadge.textContent = total;
        cartBadge.style.display = total > 0 ? 'block' : 'none';
      }
    };

  </script>
</body>

</html>
