<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2563eb">
  <meta name="format-detection" content="telephone=no">
  <meta name="x-ua-compatible" content="IE=edge">
  <title>Seedy Seedy</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

  <!-- أضف هذا داخل الـ head -->
  <meta name="apple-mobile-web-app-title" content="Seedy Seedy">
  <meta name="msapplication-TileColor" content="#2563eb">
  <meta name="msapplication-TileImage" content="apple-touch-icon.png">
  <!-- تعريف الأيقونة للتثبيت -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet">

  <!-- Firebase & Charts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#2563eb', // Blue-600
              soft: '#eff6ff',
            },
            slate: {
              50: '#f8fafc',
              100: '#f1f5f9',
              800: '#1e293b',
              900: '#0f172a',
            }
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '2rem',
          }
        }
      }
    }
  </script>

  <!-- =========================================================
     INTERNAL CSS — Design System
========================================================= -->
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #0ea5e9;
      --primary-2: #0284c7;
      --primary-soft: #e0f2fe;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #6366f1;
      --shadow: 0 4px 14px rgba(15, 23, 42, .06);
      --shadow-lg: 0 10px 30px rgba(15, 23, 42, .12);
      --radius: 14px;
      --sidebar-w: 260px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    body {
      overscroll-behavior-y: contain;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --sidebar-w: 280px;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: 'Cairo', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      scroll-behavior: smooth;
    }

    input, textarea, select {
      -webkit-user-select: text;
      user-select: text;
    }

    /* هيكل التطبيق الأساسي */
    .app-wrapper {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* القائمة الجانبية - وضع الكمبيوتر */
    .sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      position: fixed;
      top: 0;
      right: 0;
      /* ثابتة لليمين */
      background: #ffffff;
      border-left: 1px solid #e2e8f0;
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    /* منطقة المحتوى - وضع الكمبيوتر */
    .main-content {
      flex: 1;
      margin-right: var(--sidebar-w);
      /* حجز مساحة القائمة */
      min-width: 0;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* --- تعديلات الموبايل والتابلت (الشاشات الصغيرة) --- */
    /* تأثير انزلاق القائمة من اليمين */
    @media (max-width: 1024px) {
      :root {
        --sidebar-w: 100%;
      }
      
      .sidebar {
        transform: translateX(100%);
        width: 80%;
        max-width: 320px;
        box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease-in-out !important;
      }

      .sidebar.open {
        transform: translateX(0) !important;
      }

      /* الغطاء الشفاف */
      .overlay {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      .overlay.active {
        opacity: 1;
        pointer-events: auto;
        background: rgba(15, 23, 42, 0.4);
      }
    }

    /* تنسيق روابط القائمة الجانبية المطور */
    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin: 6px 10px;
      border-radius: 14px;
      color: #64748b;
      font-weight: 700;
      font-size: 13.5px;
      transition: all 0.2s ease;
      text-decoration: none !important;
      cursor: pointer;
      min-height: 48px;
      -webkit-tap-highlight-color: transparent;
    }

    /* حالة التحويم (Hover) */
    .nav-link:hover {
      background: #f1f5f9;
      color: #2563eb;
      transform: translateX(-4px);
    }

    .nav-link:active {
      transform: scale(0.98);
    }

    /* الحالة النشطة (Active) */
    .nav-link.active {
      background: #2563eb;
      color: #ffffff !important;
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.25);
    }

    /* عناوين المجموعات (مثل: الرئيسية، المبيعات) */
    .nav-group-title {
      padding: 28px 24px 8px;
      font-size: 10px;
      font-weight: 900;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* ضبط حجم الأيقونات */
    .nav-link i,
    .nav-link svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* تنسيق الكروت في لوحة التحكم (للموبايل) */
    .kpi-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(1, 1fr);
      /* عمود واحد للموبايل */
    }

    @media (min-width: 768px) {
      .kpi-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1280px) {
      .kpi-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* أنيميشن بسيط */
    @keyframes fade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* دعم المساحات الآمنة (النوتش في الآيفون) */
    .safe-p {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .safe-pb {
      padding-bottom: env(safe-area-inset-bottom);
    }

    .sidebar-drawer {
      transition: transform 0.3s ease-in-out;
      transform: translateX(100%);
      /* للـ RTL */
    }

    .sidebar-drawer.open {
      transform: translateX(0);
    }

    /* Bottom Navigation Bar للموبايل فقط */
    .mobile-nav {
      padding-bottom: env(safe-area-inset-bottom);
    }

    .soft-ui-card {
      background: #ffffff;
      border: 1px solid #f1f5f9;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      border-radius: 2rem;
    }

    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(241, 245, 249, 1);
    }

    /* تحسين شكل السكرول بار */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }

    html.dark {
      --bg: #0b1220;
      --surface: #111a2e;
      --surface-2: #0f1729;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #1f2a44;
      --primary: #38bdf8;
      --primary-2: #0ea5e9;
      --primary-soft: #0c2740;
      --shadow: 0 4px 14px rgba(0, 0, 0, .4);
      --shadow-lg: 0 10px 30px rgba(0, 0, 0, .5);
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cairo', 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-size-adjust: 100%;
    }

    @media (max-width: 480px) {
      html,
      body {
        font-size: 13px;
      }
    }

    html[dir="ltr"] body {
      font-family: 'Inter', 'Cairo', system-ui, sans-serif
    }

    a {
      color: inherit;
      text-decoration: none
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit
    }

    /* Responsive Images */
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* تنسيقات معرض الصور والزوم */
    .product-gallery {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .main-img-container {
      width: 100%;
      max-width: 100%;
      height: auto;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      position: relative;
      cursor: zoom-in;
    }

    .main-img-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.3s ease;
      display: block;
    }

    .main-img-container:hover img {
      transform: scale(1.2);
    }

    /* قوة الزوم */

    .thumb-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 5px 0;
      margin: 0 -5px;
      padding-left: 5px;
      padding-right: 5px;
    }

    .thumb-item {
      flex-shrink: 0;
      width: 60px;
      height: 60px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      object-fit: cover;
    }

    .thumb-item.active {
      border-color: var(--primary);
    }

    /* زر السلة العائم للموبايل */
    .floating-cart {
      position: fixed;
      bottom: 90px;
      inset-inline-end: 16px;
      background: var(--success);
      color: #fff;
      padding: 12px 18px;
      border-radius: 30px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      z-index: 40;
      cursor: pointer;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }

    input,
    select,
    textarea {
      font-family: inherit;
      font-size: 16px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      width: 100%;
      outline: none;
      transition: .2s
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft)
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px
    }

    /* Layout */
    .app {
      display: flex;
      min-height: 100vh
    }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-inline-end: 1px solid var(--border);
      position: fixed;
      inset-block: 0;
      inset-inline-start: 0;
      display: flex;
      flex-direction: column;
      transition: .3s;
      z-index: 50;
      overflow-y: auto;
    }

    html[dir="ltr"] .sidebar {
      border-inline-end: 1px solid var(--border);
      border-inline-start: none
    }

    .sidebar .brand {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border)
    }

    .sidebar .brand .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--info));
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900
    }

    .sidebar .brand .name {
      font-weight: 900;
      font-size: 16px
    }

    .sidebar .nav {
      flex: 1;
      overflow: auto;
      padding: 12px
    }

    .sidebar .nav .group {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 14px 12px 6px;
      font-weight: 700
    }

    .sidebar .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 2px;
      transition: .2s;
      font-size: 13.5px
    }

    .sidebar .nav a:hover {
      background: var(--surface-2);
      color: var(--text)
    }

    .sidebar .nav a.active {
      background: var(--primary-soft);
      color: var(--primary-2)
    }

    .sidebar .nav a .ico {
      width: 20px;
      text-align: center
    }

    .sidebar .user {
      padding: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px
    }

    .sidebar .user .av {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800
    }

    .main {
      flex: 1;
      margin-inline-start: var(--sidebar-w);
      min-width: 0;
      overflow-x: hidden;
    }

    html[dir="ltr"] .main {
      margin-inline-start: var(--sidebar-w);
      margin-inline-end: 0
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 56px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar .spacer {
      flex: 1
    }

    .topbar .icon-btn {
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: 10px;
      background: var(--surface-2);
      display: grid;
      place-items: center;
      color: var(--text);
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .topbar .icon-btn:active {
      transform: scale(0.95);
    }

    .topbar .icon-btn .badge {
      position: absolute;
      top: 4px;
      inset-inline-start: 4px;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 5px
    }

    .menu-toggle {
      display: none
    }

    .content {
      padding: 20px;
      max-width: 1500px;
      margin: auto
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      overflow-x: hidden;
    }

    .card h3 {
      margin: 0 0 16px;
      font-size: 15px;
      font-weight: 800;
      word-break: break-word;
    }

    .grid {
      display: grid;
      gap: 16px;
      width: 100%;
    }

    .grid.cols-4 {
      grid-template-columns: repeat(4, 1fr);
    }

    .grid.cols-3 {
      grid-template-columns: repeat(3, 1fr)
    }

    .grid.cols-2 {
      grid-template-columns: repeat(2, 1fr)
    }

    #shopGrid {
      gap: 18px;
    }

    .shop-card {
      border-radius: 1.75rem;
      box-shadow: 0 22px 45px rgba(15, 23, 42, .08);
      transition: transform .3s ease, box-shadow .3s ease;
    }

    .shop-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 26px 55px rgba(15, 23, 42, .12);
    }


    .shop-card-image {
      overflow: hidden;
      border-radius: 1.5rem;
      min-height: 180px;
      background: #f8fafc;
    }

    .shop-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s ease;
    }

    .shop-card:hover .shop-card-image img {
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      .shop-card {
        padding: 16px;
      }

      .shop-card-image {
        min-height: 170px;
      }
    }

    .shop-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .7s ease;
    }

    .shop-card:hover .shop-card-image img {
      transform: scale(1.08);
    }

    .qty-control {
      gap: .75rem;
    }

    @media (max-width: 640px) {
      #shopGrid {
        gap: 16px;
      }

      .shop-card {
        border-radius: 1.4rem;
      }
    }

    /* تنسيق روابط القائمة الجانبية المطور */
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      transition: .25s
    }

    .kpi:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg)
    }

    .kpi .ic {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 22px;
      color: #fff;
    }

    .kpi .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600
    }

    .kpi .value {
      font-size: 18px;
      font-weight: 900;
      margin-top: 2px;
      word-break: break-word;
    }

    .kpi .delta {
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px
    }

    .kpi .delta.up {
      color: var(--success)
    }

    .kpi .delta.down {
      color: var(--danger)
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13.5px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      transition: .2s;
      min-height: 44px;
      min-width: 44px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover {
      transform: translateY(-1px)
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      border: none;
      box-shadow: 0 4px 12px rgba(14, 165, 233, .35)
    }

    .btn.success {
      background: var(--success);
      color: #fff;
      border: none
    }

    .btn.danger {
      background: var(--danger);
      color: #fff;
      border: none
    }

    .btn.ghost {
      background: transparent
    }

    .btn.sm {
      padding: 8px 12px;
      font-size: 12px
    }

    /* Tables */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface)
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 100%;
    }

    th,
    td {
      padding: 12px 14px;
      text-align: start;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    th {
      background: var(--surface-2);
      font-weight: 800;
      color: var(--muted);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: .5px;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: var(--surface-2)
    }

    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700
    }

    .tag.pending {
      background: #fef3c7;
      color: #92400e
    }

    .tag.processing {
      background: #dbeafe;

  <script>
    /* ===========================================================

    const FIREBASE_CONFIG = {

    };
    const USE_FIREBASE = true; // auto-set true when FIREBASE_CONFIG filled
    // تهيئة فيرباس
    firebase.initializeApp(FIREBASE_CONFIG);

    const State = {
      user: null,

      storeMode: false,

          { id: 'sc1', name: 'بوسطة', basePrice: 45, extraKgPrice: 7, note: '' },

        ]
      }
    };

    // التعرف على البائع من الرابط (مثال: my site.com/?ref=u1)
    const urlParams = new URLSearchParams(window.location.search);
    // نظام الدخول التلقائي للموظفين عبر الرابط الخاص
    const authRef = urlParams.get('auth');

    if (authRef && !State.user) {
      const foundUser = State.data.users.find(u => u.id === authRef);
      if (foundUser) {
        State.user = foundUser;
        // حفظ الجلسة لكي لا يضطر للدخول مرة أخرى
        localStorage.setItem('session', JSON.stringify({ id: foundUser.id, t: Date.now() }));
        // توجيهه لأول صفحة مسموحة له
        State.page = foundUser.allowedPages && foundUser.allowedPages.length > 0 ? foundUser.allowedPages[0] : 'shop';
        toast(`مرحباً ${foundUser.name}، تم تسجيل دخولك بنجاح`, 'success');
      }
    }

    function initializeStoreMode() {
      const pathMatch = window.location.pathname.match(/\/store\/([^\/]+)/);
      let foundStore = null;
      if (pathMatch) foundStore = pathMatch[1];
      const storeLink = urlParams.get('store') || foundStore;

      if (storeLink) {
        const employee = State.data.users.find(u => u.storeLink === storeLink);
        if (employee) {
          State.storeMode = true;
          State.storeEmployeeId = employee.id;
          State.page = 'shop';
          sessionStorage.setItem('storeLink', storeLink);
          sessionStorage.setItem('referredSellerId', employee.id);
          console.log(`متجر موظف: ${employee.name}`);
        }
      } else {
        const savedStoreLink = sessionStorage.getItem('storeLink');
        if (savedStoreLink) {
          const employee = State.data.users.find(u => u.storeLink === savedStoreLink);
          if (employee) {
            State.storeMode = true;
            State.storeEmployeeId = employee.id;
            sessionStorage.setItem('referredSellerId', employee.id);
          }
        }
      }

      const sellerRef = urlParams.get('ref');
      if (sellerRef) {
        sessionStorage.setItem('referredSellerId', sellerRef);
        const sellerObj = State.data.users.find(u => u.id === sellerRef);
        if (sellerObj) {
          State.referredSellerName = sellerObj.name;
          console.log("العميل يتبع الآن للبائع: " + sellerObj.name);
        }
      } else {
        State.referredSellerId = sessionStorage.getItem('referredSellerId');
      }
    }

    /* Permissions matrix */
    const ROLES = {
      super_admin: { label: 'مدير عام', color: '#ef4444', pages: '*' },
      sales: { label: 'مندوب مبيعات', color: '#10b981', pages: ['dashboard', 'pos', 'customers', 'orders', 'products'] },
      ops: { label: 'تشغيل ومخازن', color: '#f59e0b', pages: ['dashboard', 'orders', 'products', 'shipments', 'warehouses'] },
      customer: { label: 'عميل', color: '#6366f1', pages: ['shop', 'my-orders', 'cart'] }
    };

    const GOVS = ['القاهرة', 'الجيزة', 'الإسكندرية', 'الدقهلية', 'الشرقية', 'القليوبية', 'كفر الشيخ', 'الغربية', 'المنوفية', 'البحيرة', 'الإسماعيلية', 'بورسعيد', 'السويس', 'دمياط', 'الفيوم', 'بني سويف', 'المنيا', 'أسيوط', 'سوهاج', 'قنا', 'الأقصر', 'أسوان', 'البحر الأحمر', 'الوادي الجديد', 'مطروح', 'شمال سيناء', 'جنوب سيناء'];

    const DEPLOYED_HOST = 'https://seedy-seedy.pages.dev';
    function getAppOrigin() {
      const origin = typeof window !== 'undefined' ? window.location.origin : '';
      return /^https?:\/\//.test(origin) ? origin : DEPLOYED_HOST;
    }
    const APP_ORIGIN = getAppOrigin();

    window.posCategory = 'all'; // الفئة الافتراضية للـ POS

    /* ===========================================================
       2. STORAGE LAYER (LocalStorage + Firebase fallback)
    =========================================================== */
    const Store = {
      KEY: 'erp_data_v1',
      DOC_ID: 'sedy_private_store_tarek', // اسم فريد خاص بك فقط

      async save() {
        localStorage.setItem(this.KEY, JSON.stringify(State.data));
        if (USE_FIREBASE && typeof db !== 'undefined') {
          try {
            await db.collection('settings').doc(this.DOC_ID).set(State.data);
            console.log("✅ تم الحفظ في السحابة");
          } catch (e) { console.error("Cloud Save Error", e); }
        }
      },

      async load() {
        // تحميل من الجهاز أولاً للسرعة
        try {
          const localData = JSON.parse(localStorage.getItem(this.KEY));
          if (localData) State.data = localData;
        } catch (e) { }

        if (!State.data.settings) {
          State.data.settings = { whatsappNumber: '20100123456789', whatsappAutoSend: true };
        }

        // المزامنة اللحظية
        if (USE_FIREBASE && typeof db !== 'undefined') {
          db.collection('settings').doc(this.DOC_ID).onSnapshot((doc) => {
            if (doc.exists) {
              State.data = doc.data();
              if (!State.data.settings) {
                State.data.settings = { whatsappNumber: '20100123456789', whatsappAutoSend: true };
              }
              render();
              console.log("☁️ البيانات متزامنة الآن");
            }
          });
        }
      }
    };


    function uid() { return Math.random().toString(36).slice(2, 10) }
    function now() { return Date.now() }
    function fmt(n) { return new Intl.NumberFormat('ar-EG').format(Math.round(n || 0)) }
    function money(n) { return fmt(n) + ' ج.م' }
    function copyToClipboard(text, label) {
      navigator.clipboard.writeText(text).then(() => {
        toast((label || 'تم النسخ') + ' ✅', 'success');
      }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        toast((label || 'تم النسخ') + ' ✅', 'success');
      });
    }
    function normalizeWhatsAppNumber(number) {
      return (number || '').toString().replace(/[^0-9]/g, '').replace(/^00/, '').replace(/^\+/, '');
    }
    function getSellerWhatsApp(order = {}) {
      const settings = State.data.settings || {};
      let number = '';
      const isOnlineOrder = !order.salesmanId || order.salesmanId === 'online' || order.salesmanId === 'system';

      if (!isOnlineOrder) {
        const salesman = State.data.users.find(u => u.id === order.salesmanId);
        if (salesman && salesman.phone) {
          number = salesman.phone;
        } else if (order.sellerPhone) {
          number = order.sellerPhone;
        } else {
          return '';
        }
      } else {
        number = order.whatsappNumber || settings.whatsappNumber || '';
      }

      return normalizeWhatsAppNumber(number);

    function buildOrderWhatsAppMessage(order, customer) {
      const sellerName = order.sellerName || (State.data.users.find(u => u.id === order.salesmanId)?.name) || 'أونلاين مباشر';
      const lines = [
        `طلب جديد: ${order.code}`,
        `اسم البائع: ${sellerName}`,
        `اسم العميل: ${customer?.name || order.customerName || 'غير معروف'}`,
        `رقم الهاتف: ${customer?.phone || order.customerPhone || 'غير متوفر'}`,
        `العنوان: ${order.address || customer?.address || 'غير محدد'}`,
        '',
        'المنتجات:'
      ];
      if (order.sellerPhone) lines.push(`رقم بائع الواتساب: ${order.sellerPhone}`);
      order.items.forEach(item => {
        const p = State.data.products.find(x => x.id === item.pid) || {};
        lines.push(`- ${p.name || item.name || 'منتج'} × ${item.qty} = ${money(item.qty * item.price)}`);
      });
      lines.push('', `الإجمالي النهائي: ${money(order.total)}`);
      if (order.paid) lines.push(`المدفوع: ${money(order.paid)}`);
      if (order.remaining > 0) lines.push(`المتبقي: ${money(order.remaining)}`);
      if (order.trackingNumber) lines.push(`رقم التتبع: ${order.trackingNumber}`);
      lines.push('', `الحالة: ${statusAr(order.status)}`);
      return lines.join('\n');
    }

    function normalizeSlug(value) {
      const s = (value || '').toString().toLowerCase().trim();
      return s
        .replace(/[^a-z0-9\u0621-\u064A\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/(^-|-$)/g, '');
    }
    function generateStoreLink(nameOrId) {
      const base = normalizeSlug(nameOrId) || uid();
      let slug = base;
      let counter = 1;
      const users = (State.data && Array.isArray(State.data.users)) ? State.data.users : [];
      while (users.some(u => u.storeLink === slug)) {
        slug = `${base}-${counter}`;
        counter += 1;
      }
      return slug;
    }

    /* ===========================================================
       4. AUTHENTICATION
    =========================================================== */
    const Auth = {
      /* استبدل دالة login داخل كائن Auth بهذا الكود */

      login(email, pass) {
        const u = State.data.users.find(x => x.email === email && x.pass === pass);
        if (!u) return null;

        State.user = u;

        // --- منطق التوجيه الذكي المطور ---

        if (u.role === 'super_admin') {
          // المدير العام يفتح دائماً على لوحة التحكم
          State.page = 'dashboard';
        }
        else if (u.allowedPages && u.allowedPages.length > 0) {
          // الموظف يفتح على أول صفحة تم تحديدها له في الصلاحيات
          // مثال: إذا كانت أول صفحة مسموحة له هي "الطلبات"، سيفتح عليها مباشرة
          State.page = u.allowedPages[0];
        }
        else {
          // إذا لم يتم تحديد صفحات مخصصة، نعود للصلاحيات الافتراضية للدور (Role)
          const r = ROLES[u.role];
          if (r.pages === '*') {
            State.page = 'dashboard';
          } else if (Array.isArray(r.pages) && r.pages.length > 0) {
            State.page = r.pages[0];
          } else {
            // حالة احتياطية إذا لم يوجد أي شيء
            State.page = 'shop';
          }
        }

        // حفظ الجلسة وتسجيل النشاط
        localStorage.setItem('session', JSON.stringify({ id: u.id, t: now() }));
        log(u.email, 'تسجيل دخول وتوجيه لصفحة: ' + State.page);

        return u;
      },
      logout() { State.user = null; State.page = 'shop'; localStorage.removeItem('session'); render(); },
      restore() {
        try {
          const s = JSON.parse(localStorage.getItem('session'));
          if (s) { State.user = State.data.users.find(u => u.id === s.id); }
        } catch (e) { }
      },
      can(page) {
        // 1. الصفحات العامة: تظهر دائماً للكل (زائر أو مستخدم)
        if (['shop', 'cart'].includes(page)) return true;

        // 2. إذا لم يكن هناك تسجيل دخول، لا تظهر باقي الصفحات
        if (!State.user) return false;

        // 3. المدير العام (super_admin) يرى كل شيء دائماً
        if (State.user.role === 'super_admin') return true;

        // 4. باقي المستخدمين: حسب الصفحات المحددة لهم
        return State.user.allowedPages && State.user.allowedPages.includes(page);
      }
    };
    function log(user, action) {

    }

    /* ===========================================================

    =========================================================== */
function render() {
      try {
        document.documentElement.classList.toggle('dark', State.theme === 'dark');
        document.documentElement.dir = State.lang === 'ar' ? 'rtl' : 'ltr';
        const root = document.getElementById('app-root');

        // منع مسح الهيكل بالكامل إذا كان موجوداً بالفعل (لتحسين الأداء)
        let currentShell = 'public';
        if (State.storeMode) {
          currentShell = 'store';
        } else if (State.user) {
          currentShell = 'admin';
        }
        const activeShell = root.dataset.shell;

        if (activeShell !== currentShell) {
          root.innerHTML = State.storeMode ? PublicShell() : (State.user ? AppShell() : PublicShell());
          root.dataset.shell = currentShell;
          if (State.user && !State.storeMode) bindShell(); // ربط أحداث القائمة الجانبية
        }

        // 👇 السطرين السحريين الجداد 👇
        // لو إحنا في وضع المتجر (Store Mode)، بنفلتر المنتجات ونستبعد المخفية قبل العرض
        if (State.storeMode && State.data && State.data.products) {
          State.data.products = State.data.products.filter(p => p.isAvailable !== 'مخفي' && p.isAvailable !== 'لا');
        }

        // رسم محتوى الصفحة الداخلية
        renderPage();

        // تشغيل الأيقونات
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      } catch (error) {
        console.error("Render Error:", error);
      }
    }

    window.toggleSidebar = (show) => {
      const sidebar = document.getElementById('mainSidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if (!sidebar) return;

      // إذا لم نرسل true أو false، نجعلها تعكس الحالة الحالية (Toggle)
      const isCurrentlyOpen = sidebar.classList.contains('open');
      const shouldOpen = (show === undefined) ? !isCurrentlyOpen : show;

      if (shouldOpen) {
        sidebar.classList.add('open');
        overlay?.classList.add('active');
      } else {
        sidebar.classList.remove('open');
        overlay?.classList.remove('active');
      }
    };

    function notify({ type, title, orderId = null, productId = null, salesmanId = null }) {
      State.data.notifications.unshift({
        id: uid(),
        title,
        type,
        orderId,
        productId,
        salesmanId,
        time: now(),
        read: false
      });
      Store.save();
    }

    function notifyOrderEvent(order, message) {
      const target = order.salesmanId || order.salesman || null;
      notify({ type: 'order', title: message, orderId: order.id, salesmanId: target });
    }

    function notifyProductEvent(message, productId = null) {
      notify({ type: 'product', title: message, productId, salesmanId: null });
    }

    function orderProfit(order) {
      return (order.items || []).reduce((sum, item) => {
        const p = State.data.products.find(x => x.id === item.pid);
        const profitPerItem = item.marketingProfit ?? (p ? p.marketingProfit || 0 : 0);
        return sum + (profitPerItem * item.qty);
      }, 0);
    }

    function filterOrdersByRange(orders, range) {
      const nowTime = now();
      return orders.filter(o => {
        if (!o || !o.date) return false;
        const orderTime = new Date(o.date).getTime();
        if (range === 'today') {
          const orderDate = new Date(orderTime);
          const today = new Date(nowTime);
          return orderDate.toDateString() === today.toDateString();
        }
        if (range === 'week') {
          return orderTime >= nowTime - 7 * 86400000;
        }
        if (range === 'month') {
          return orderTime >= nowTime - 30 * 86400000;
        }
        return true;
      });
    }

    Dashboard.after = () => {
      const visibleOrders = getVisibleOrders();
      const range = window.dashboardAnalyticsPeriod || 'all';
      const orders = filterOrdersByRange(visibleOrders, range);
      const chartOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { font: { size: 12 } } } },
        scales: {
          y: { beginAtZero: true, grid: { display: false }, ticks: { font: { size: 10 } } },
          x: { grid: { display: false }, ticks: { font: { size: 10 } } }
        }
      };

      window.DashboardCharts = window.DashboardCharts || {};
      const destroyChart = (key) => {
        if (window.DashboardCharts[key]) {
          window.DashboardCharts[key].destroy();
          delete window.DashboardCharts[key];
        }
      };

      const sellers = Object.values(orders.reduce((acc, o) => {
        const sellerId = o.salesmanId || o.salesman || 'online';
        const sellerName = State.data.users.find(u => u.id === sellerId)?.name || 'أونلاين مباشر';
        if (!acc[sellerId]) acc[sellerId] = { name: sellerName, total: 0, profit: 0, orders: 0 };
        acc[sellerId].total += o.total || 0;
        acc[sellerId].profit += orderProfit(o);
        acc[sellerId].orders += 1;
        return acc;
      }, {})).sort((a, b) => b.total - a.total).slice(0, 6);

      const sellerLabels = sellers.map(s => s.name);
      const sellerSales = sellers.map(s => s.total);
      const sellerProfit = sellers.map(s => s.profit);
      const ctxSellers = document.getElementById('dashboardTopSellers');
      if (ctxSellers) {
        destroyChart('dashboardTopSellers');
        ctxSellers.parentElement.style.height = '320px';
        window.DashboardCharts.dashboardTopSellers = new Chart(ctxSellers, {
          type: 'bar',
          data: {
            labels: sellerLabels,
            datasets: [
              { label: 'إجمالي المبيعات', data: sellerSales, backgroundColor: '#2563eb' },
              { label: 'إجمالي الأرباح', data: sellerProfit, backgroundColor: '#10b981' }
            ]
          },
          options: { ...chartOptions, plugins: { ...chartOptions.plugins, legend: { position: 'bottom' } } }
        });
      }

      const products = Object.values(orders.reduce((acc, o) => {
        (o.items || []).forEach(item => {
          const product = State.data.products.find(p => p.id === item.pid);
          const name = product?.name || item.pid;
          if (!acc[item.pid]) acc[item.pid] = { name, qty: 0, revenue: 0 };
          acc[item.pid].qty += item.qty || 0;
          acc[item.pid].revenue += (item.price || 0) * (item.qty || 0);
        });
        return acc;
      }, {})).sort((a, b) => b.qty - a.qty).slice(0, 8);

      const prodLabels = products.map(p => p.name);
      const prodQty = products.map(p => p.qty);
      const prodRevenue = products.map(p => p.revenue);
      const ctxProducts = document.getElementById('dashboardTopProducts');
      if (ctxProducts) {
        destroyChart('dashboardTopProducts');
        ctxProducts.parentElement.style.height = '320px';
        window.DashboardCharts.dashboardTopProducts = new Chart(ctxProducts, {
          type: 'bar',
          data: {
            labels: prodLabels,
            datasets: [
              { label: 'الكمية المباعة', data: prodQty, backgroundColor: '#818cf8' },
              { label: 'الإيرادات', data: prodRevenue, backgroundColor: '#f59e0b' }
            ]
          },
          options: { ...chartOptions, plugins: { ...chartOptions.plugins, legend: { position: 'bottom' } } }
        });
      }

      const salesBuckets = [];
      const salesLabels = [];
      const nowDate = new Date();
      if (range === 'today') {
        for (let hour = 0; hour < 24; hour += 2) {
          salesLabels.push(`${hour}:00`);
          const start = new Date(nowDate.getFullYear(), nowDate.getMonth(), nowDate.getDate(), hour).getTime();
          const end = start + 2 * 3600000;
          salesBuckets.push(orders.filter(o => o.date >= start && o.date < end).reduce((sum, o) => sum + (o.total || 0), 0));
        }
      } else if (range === 'week') {
        for (let i = 6; i >= 0; i--) {
          const day = new Date(nowDate.getTime() - i * 86400000);
          const from = new Date(day.getFullYear(), day.getMonth(), day.getDate()).getTime();
          const to = from + 86400000;
          salesLabels.push(day.toLocaleDateString('ar-EG', { weekday: 'short' }));
          salesBuckets.push(orders.filter(o => o.date >= from && o.date < to).reduce((sum, o) => sum + (o.total || 0), 0));
        }
      } else if (range === 'month') {
        for (let i = 29; i >= 0; i--) {
          const day = new Date(nowDate.getTime() - i * 86400000);
          const from = new Date(day.getFullYear(), day.getMonth(), day.getDate()).getTime();
          const to = from + 86400000;
          salesLabels.push(`${day.getDate()}/${day.getMonth() + 1}`);
          salesBuckets.push(orders.filter(o => o.date >= from && o.date < to).reduce((sum, o) => sum + (o.total || 0), 0));
        }
      } else {
        const months = {};
        orders.forEach(o => {
          const d = new Date(o.date);
          const key = `${d.getFullYear()}-${d.getMonth() + 1}`;
          months[key] = (months[key] || 0) + (o.total || 0);
        });
        Object.entries(months).sort(([a], [b]) => new Date(a + '-01') - new Date(b + '-01')).forEach(([key, total]) => {
          const [year, month] = key.split('-');
          salesLabels.push(`${month}/${year}`);
          salesBuckets.push(total);
        });
      }

      const ctxSales = document.getElementById('dashboardSalesTrend');
      if (ctxSales) {
        destroyChart('dashboardSalesTrend');
        ctxSales.parentElement.style.height = '320px';
        window.DashboardCharts.dashboardSalesTrend = new Chart(ctxSales, {
          type: 'line',
          data: {
            labels: salesLabels,
            datasets: [{
              label: 'المبيعات',
              data: salesBuckets,
              borderColor: '#2563eb',
              backgroundColor: 'rgba(37,99,235,0.12)',
              fill: true,
              tension: 0.35
            }]
          },
          options: { ...chartOptions, plugins: { ...chartOptions.plugins, legend: { position: 'bottom' } } }
        });
      }

      const statusCounts = ORDER_STATUSES.reduce((acc, status) => ({ ...acc, [status]: 0 }), {});
      orders.forEach(o => {
        const key = o.status || 'pending';
        if (statusCounts[key] !== undefined) statusCounts[key] += 1;
      });
      const statusLabels = Object.entries(statusCounts).filter(([, value]) => value > 0).map(([status]) => statusAr(status));
      const statusValues = Object.entries(statusCounts).filter(([, value]) => value > 0).map(([, value]) => value);
      const ctxOrderStatus = document.getElementById('dashboardOrderStatus');
      if (ctxOrderStatus) {
        destroyChart('dashboardOrderStatus');
        ctxOrderStatus.parentElement.style.height = '320px';
        window.DashboardCharts.dashboardOrderStatus = new Chart(ctxOrderStatus, {
          type: 'doughnut',
          data: {
            labels: statusLabels,
            datasets: [{ data: statusValues, backgroundColor: ['#f59e0b', '#0ea5e9', '#6366f1', '#10b981', '#ef4444', '#64748b'] }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 12, font: { size: 11 } } } }
          }
        });
      }

      const locations = Object.values(orders.reduce((acc, o) => {
        const location = o.gov || 'غير محدد';
        if (!acc[location]) acc[location] = { name: location, orders: 0, total: 0 };
        acc[location].orders += 1;
        acc[location].total += o.total || 0;
        return acc;
      }, {})).sort((a, b) => b.orders - a.orders).slice(0, 8);

      const locationLabels = locations.map(l => l.name);
      const locationValues = locations.map(l => l.orders);
      const ctxLocations = document.getElementById('dashboardTopLocations');
      if (ctxLocations) {
        destroyChart('dashboardTopLocations');
        ctxLocations.parentElement.style.height = '320px';
        window.DashboardCharts.dashboardTopLocations = new Chart(ctxLocations, {
          type: 'doughnut',
          data: {
            labels: locationLabels,
            datasets: [{ data: locationValues, backgroundColor: ['#2563eb', '#10b981', '#f97316', '#ec4899', '#8b5cf6', '#14b8a6', '#0ea5e9', '#facc15'] }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'bottom', labels: { boxWidth: 12, padding: 12, font: { size: 11 } } }
            }
          }
        });
      }
    };

    function kpi(ic, label, value, delta, dir, bg) { return `<div class="kpi"><div class="ic" style="background:${bg}">${ic}</div><div style="flex:1"><div class="label">${label}</div><div class="value">${value}</div><div class="delta ${dir}">${delta} عن الشهر السابق</div></div></div>` }
    function statusAr(s) { return { pending: 'قيد الانتظار', confirmed: 'تم التأكيد', preparing: 'قيد التحضير', processing: 'قيد المعالجة', packed: 'تم التغليف', shipped: 'تم الشحن', delivered: 'تم التسليم', returned: 'مرتجع', cancelled: 'ملغي' }[s] || s }

    /* ===========================================================
       12. PRODUCTS
    =========================================================== */
    // --- 1. واجهة صفحة المنتجات ---
    function Products() {
      return `
  <div class="bg-white rounded-[2rem] p-6 border border-slate-100 soft-shadow">
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-8">
      <div>
        <h3 class="text-xl font-black text-slate-800 flex items-center gap-2">
          <i data-lucide="package" class="text-blue-600"></i> إدارة المخزون الشاملة
        </h3>
        <div id="bulkActions" class="hidden mt-2 animate-pop">
            <button onclick="deleteSelectedProducts()" class="px-4 py-2 bg-red-50 text-red-600 rounded-xl font-black text-xs border border-red-100">حذف المحدد</button>
        </div>
      </div>
      <div class="flex flex-wrap gap-2">
        <button onclick="downloadProductTemplate()" class="btn bg-slate-900 text-white border-none text-xs"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i> القالب</button>
        <button onclick="exportExcelProducts()" class="btn border-blue-100 bg-blue-50 text-blue-600 text-xs"><i data-lucide="download" class="w-4 h-4"></i> تصدير</button>
        <label class="btn border-emerald-100 bg-emerald-50 text-emerald-600 text-xs cursor-pointer">
          <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> استيراد

    <div class="flex flex-col md:flex-row gap-4 mb-6 bg-slate-50 p-4 rounded-3xl border border-slate-100">
      <div class="relative flex-1">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
        <input id="prodSearch" placeholder="بحث..." oninput="filterAndSortProducts()" class="w-full bg-white border-none rounded-2xl pl-10 pr-4 py-3 text-sm">
      </div>
      <select id="prodSort" onchange="filterAndSortProducts()" class="bg-white border-none rounded-2xl px-4 py-3 text-xs font-bold text-blue-600">

      </select>
    </div>

    <div class="table-wrap border-none overflow-x-auto">
      <table class="w-full text-right whitespace-nowrap">
        <thead>
          <tr class="text-slate-400 text-[10px] font-black uppercase border-b border-slate-100">
            <th class="pb-4 w-10 text-center"><input type="checkbox" onchange="toggleAllProducts(this)" class="accent-blue-600"></th>
            <th class="pb-4">المنتج</th>
            <th class="pb-4">الوصف المختصر</th>
            <th class="pb-4">التصنيف</th>
            <th class="pb-4">التكلفة</th>
            <th class="pb-4">السعر</th>
            <th class="pb-4 text-emerald-600 font-black">عمولة التسويق</th>
            <th class="pb-4 text-emerald-600 font-black">الربح</th>
            <th class="pb-4">الوزن</th>
            <th class="pb-4">الحالة</th>
            <th class="pb-4">المخزون</th>
            <th class="pb-4 text-left px-4">إجراءات</th>
          </tr>
        </thead>
        <tbody id="prodBody">${prodRows(State.data.products)}</tbody>
      </table>
    </div>
  </div>`;
    }

    window.filterAndSortProducts = () => {
      const q = document.getElementById('prodSearch')?.value.toLowerCase() || '';
      const sortBy = document.getElementById('prodSort')?.value || 'name_asc';

      // 1. الفلترة حسب البحث
      let list = State.data.products.filter(p =>
        (p.name?.toLowerCase().includes(q) || p.sku?.toLowerCase().includes(q))
      );

      // 2. التسلسل (Sorting Logic)
      list.sort((a, b) => {
        switch (sortBy) {
          case 'name_asc': return a.name.localeCompare(b.name, 'ar');
          case 'name_desc': return b.name.localeCompare(a.name, 'ar');
          case 'price_high': return (b.price || 0) - (a.price || 0);
          case 'price_low': return (a.price || 0) - (b.price || 0);
          case 'stock_high': return (b.stock || 0) - (a.stock || 0);
          case 'stock_low': return (a.stock || 0) - (b.stock || 0);
          case 'available': return (b.isAvailable === false ? 0 : 1) - (a.isAvailable === false ? 0 : 1);
          case 'category': return (a.cat || '').localeCompare(b.cat || '', 'ar');
          default: return 0;
        }
      });

      // 3. تحديث الجدول
      document.getElementById('prodBody').innerHTML = prodRows(list);

      // إعادة تفعيل الأيقونات إذا لزم الأمر
      if (typeof lucide !== 'undefined') lucide.createIcons();
    };

    window.exportExcelProducts = () => {
      const products = State.data.products || [];
      const excelData = products.map(p => ({
        'الاسم': p.name,
        'sku': p.sku,
        'التكلفة': p.cost,
        'السعر': p.price,
        'الوزن': p.weightGram,
        'متوفر': p.isAvailable ? 'نعم' : 'لا',
        'وصف مختصر': p.shortDesc,
        'وصف عام': p.fullDesc,
        'المخزون': p.stock,
        // تحويل مصفوفة الصور لنص مفصول بـ | ليظهر في الإكسيل
        'روابط الصور': (p.images && p.images.length) ? p.images.join(' | ') : ''
      }));

      const worksheet = XLSX.utils.json_to_sheet(excelData);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Products");
      XLSX.writeFile(workbook, "نسخة_المخزون_بالصور.xlsx");
    };

    window.downloadProductTemplate = () => {
      const templateData = [{
        'الاسم': 'منتج تجريبي',
        'sku': '101',
        'التكلفة': 100,
        'السعر': 200,
        'عمولة التسويق': 10,
        'الوزن': 500,
        'متوفر': 'نعم',
        'وصف مختصر': 'وصف الباركود',
        'وصف عام': 'وصف المتجر التفصيلي',
        'المخزون': 100,
        // مثال لمستخدم الإكسيل يوضح كيفية وضع أكثر من رابط
        'روابط الصور': 'https://site.com/img1.jpg | https://site.com/img2.jpg | https://site.com/img3.jpg'
      }];
      const worksheet = XLSX.utils.json_to_sheet(templateData);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Template");
      XLSX.writeFile(workbook, "قالب_إدخال_متعدد_الصور.xlsx");
    };

    // --- 2. عرض صفوف المنتجات ---
    /* استبدل دالة prodRows بهذا الكود */

    function prodRows(list) {
      return list.map(p => {
        const catName = State.data.categories.find(c => c.id === p.cat)?.name || 'عام';
        const cost = parseFloat(p.cost) || 0;
        const price = parseFloat(p.price) || 0;
        const profit = price - cost;
        const marketingProfit = parseFloat(p.marketingProfit) || 0;

        // صورة المنتج
        const hasImage = p.images && p.images.length > 0;
        const displayImg = hasImage
          ? `<img src="${p.images[0]}" class="w-full h-full object-cover">`
          : `<span class="text-lg opacity-20">${p.img || '📦'}</span>`;

        return `
    <tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50/50 transition-all group">
      <!-- 1. Checkbox -->
      <td class="py-4 text-center"><input type="checkbox" name="prodCheck" value="${p.id}" onchange="updateBulkUI()" class="accent-blue-600"></td>
      
      <!-- 2. المنتج (صورة + اسم) -->
      <td class="py-4">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center overflow-hidden border border-slate-100 shadow-sm">${displayImg}</div>
          <div>
            <div class="font-black text-slate-800 text-sm">${p.name || '---'}</div>
            <div class="text-[9px] text-blue-500 font-bold">${p.sku || ''}</div>
          </div>
        </div>
      </td>

      <!-- 3. الوصف المختصر -->
      <td class="py-4"><div class="text-[10px] text-slate-400 font-bold max-w-[150px] truncate" title="${p.shortDesc || ''}">${p.shortDesc || ''}</div></td>

      <!-- 4. التصنيف -->
      <td class="py-4"><span class="bg-blue-50 text-blue-600 px-2 py-1 rounded-lg text-[9px] font-black italic border border-blue-100">${catName}</span></td>
      
      <!-- 5. التكلفة -->
      <td class="py-4 text-xs font-bold text-slate-500">${money(cost)}</td>
      
      <!-- 6. السعر -->
      <td class="py-4 font-black text-blue-600 text-sm">${money(price)}</td>
      
      <!-- 7. عمولة التسويق -->
      <td class="py-4 font-black text-emerald-600 text-sm">${money(marketingProfit)}</td>

      <!-- 8. الربح (محسوب) -->
      <td class="py-4 font-black text-emerald-600 text-sm">${money(profit)}</td>
      
      <!-- 9. الوزن -->
      <td class="py-4 text-xs font-bold text-slate-600">${p.weightGram || 0} ج</td>
      
      <!-- 9. الحالة -->
<td class="py-4">
  ${p.isAvailable === 'مخفي' ? 
    '<span class="text-red-400 font-black text-[10px]">مخفي</span>' : 
    '<span class="text-emerald-500 font-black text-[10px]">متوفر</span>'}
</td>
      
      <!-- 10. المخزون -->
      <td class="py-4 font-black text-slate-800 text-center">${p.stock || 0}</td>
      
      <!-- 11. إجراءات -->
      <td class="py-4 text-left px-4">
        <button onclick="openProductForm('${p.id}')" class="p-2 text-slate-400 hover:text-blue-600 transition-all"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
      </td>
    </tr>`;
      }).join('');
    }

    // 1. تحديد الكل
    window.toggleAllProducts = (master) => {
      const checks = document.querySelectorAll('input[name="prodCheck"]');
      checks.forEach(c => c.checked = master.checked);
      updateBulkUI();
    };

    // 2. تحديث واجهة الحذف الجماعي
    window.updateBulkUI = () => {
      const selected = document.querySelectorAll('input[name="prodCheck"]:checked').length;
      const bulkDiv = document.getElementById('bulkActions');
      if (selected > 0) bulkDiv.classList.remove('hidden');
      else bulkDiv.classList.add('hidden');
    };

    // 3. تنفيذ الحذف الجماعي
    window.deleteSelectedProducts = () => {
      if (!confirm('هل أنت متأكد من حذف المنتجات المختارة نهائياً؟')) return;
      const selectedIds = Array.from(document.querySelectorAll('input[name="prodCheck"]:checked')).map(c => c.value);
      State.data.products = State.data.products.filter(p => !selectedIds.includes(p.id));
      Store.save();
      render();
      toast(`تم حذف ${selectedIds.length} منتج بنجاح`, 'warning');
    };

    // 4. استيراد ملف Excel المطور (يدعم العربي 100%)
    window.importExcelProducts = (input) => {
      const file = input.files[0];
      if (!file) return;

      toast('جاري استيراد المنتجات والصور...', 'info');

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

          jsonData.forEach(row => {
            const find = (keys) => {
              const k = Object.keys(row).find(key => keys.includes(key.trim()));
              return k ? row[k] : null;
            };

            const name = find(['الاسم', 'المنتج']);
            if (name) {
              // --- الجزء الخاص بتعدد الصور ---
              const imgStr = find(['روابط الصور', 'images', 'الصور']);
              let imgArray = [];
              if (imgStr) {
                // تقسيم النص بناءً على العلامة | وتحويله لمصفوفة روابط
                imgArray = String(imgStr).split('|').map(u => u.trim()).filter(u => u.length > 5);
              }

              State.data.products.push({
                id: uid(),
                name: String(name),
                sku: String(find(['sku', 'كود']) || uid()),
                cat: 'c1',
                cost: parseFloat(find(['التكلفة', 'cost'])) || 0,
                price: parseFloat(find(['السعر', 'price'])) || 0,
                marketingProfit: parseFloat(find(['عمولة التسويق', 'marketingProfit', 'Marketing Profit'])) || 0,
                weightGram: parseFloat(find(['الوزن', 'weight'])) || 0,
                isAvailable: String(find(['متوفر', 'الحالة']) || '').includes('لا') ? false : true,
                shortDesc: String(find(['وصف مختصر']) || ''),
                fullDesc: String(find(['وصف عام']) || ''),
                stock: parseInt(find(['المخزون', 'stock'])) || 0,
                images: imgArray // هنا يتم تخزين الروابط المتعددة
              });
            }
          });

          Store.save(); render();
          toast('تم استيراد المنتجات وتفعيل تعدد الصور بنجاح ✅', 'success');
        } catch (err) { toast('خطأ في معالجة الملف', 'danger'); }
      };
      reader.readAsArrayBuffer(file);
      input.value = '';
    };

    // --- 3. استيراد منتجات من ملف (إضافة للموجود) ---
    window.importProductsCSV = (input) => {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const lines = e.target.result.split('\n').filter(l => l.trim());
        let added = 0;
        lines.slice(1).forEach(line => {
          const c = line.split(',').map(v => v.replace(/"/g, '').trim());
          if (!c[0]) return;
          State.data.products.push({
            id: uid(), name: c[0], sku: c[1] || uid(), weight: c[2] || 0,
            isAvailable: c[3] !== 'false', description: c[4] || '',
            cost: Number(c[5]) || 0, price: Number(c[6]) || 0, stock: Number(c[7]) || 0, cat: 'c1'
          });
          added++;
        });
        Store.save(); render(); toast(`تمت إضافة ${added} منتج جديد للقائمة ✅`, 'success');
      };
      reader.readAsText(file, 'UTF-8');
    };

    function filterProducts() {
      const q = document.getElementById('prodSearch').value.toLowerCase();
      const list = State.data.products.filter(p => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q));
      document.getElementById('prodBody').innerHTML = prodRows(list);
    }
    // دالة عالمية للتعامل مع حذف الصور لضمان عدم حدوث تداخل في الأكواد
    window.removeProductImg = (index) => {
      window._prodImgs.splice(index, 1);
      refreshImgListUI(); // تحديث الواجهة بعد الحذف
    };

    // دالة لتحديث قائمة الصور في المودال
    function refreshImgListUI() {
      const listEl = document.getElementById('imgList');
      if (!listEl) return;

      listEl.innerHTML = window._prodImgs.map((src, i) => `
      <div style="position:relative;width:70px;height:70px">
        <img src="${src}" style="width:70px;height:70px;object-fit:cover;border-radius:8px;border:1px solid var(--border)" 
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2270%22 height=%2270%22><rect width=%2270%22 height=%2270%22 fill=%22%23eee%22/><text x=%2235%22 y=%2240%22 text-anchor=%22middle%22 font-size=%2220%22>📷</text></svg>'">

// وظيفة حساب الربح اللحظي والعمولة تلقائياً
      window.calcLiveProfit = (isPriceChanged = false) => {
        const priceInput = document.getElementById('f_price');
        const costInput = document.getElementById('f_cost');
        const marketingInput = document.getElementById('f_marketingProfit');
        const liveProfitDiv = document.getElementById('liveProfit');

        if (!priceInput || !costInput || !marketingInput || !liveProfitDiv) return;

        const price = parseFloat(priceInput.value) || 0;
        const cost = parseFloat(costInput.value) || 0;

        // عند كتابة سعر البيع، يتم توليد الـ 20% تلقائياً في خانة العمولة بجانبه
        if (isPriceChanged) {
          const autoCommission = price * 0.20;
          marketingInput.value = autoCommission % 1 === 0 ? autoCommission : autoCommission.toFixed(2);
        }

        const marketingProfit = parseFloat(marketingInput.value) || 0;

        // الصافي الحقيقي = سعر البيع - التكلفة - عمولة المندوب
        const netProfit = price - cost - marketingProfit;

        if (typeof money === 'function') {
          liveProfitDiv.innerText = money(netProfit);
        } else {
          liveProfitDiv.innerText = netProfit + ' ج.م';
        }
      };

      // وظيفة الحفظ
      document.getElementById('prodForm').onsubmit = e => {
        e.preventDefault();
        const fd = Object.fromEntries(new FormData(e.target));
        const finalData = {
          ...fd,
          cost: Number(fd.cost),
          price: Number(fd.price),
          marketingProfit: Number(fd.marketingProfit) || 0,
          images: window._prodImgs,
          velocity: p.velocity || 1
        };

        if (id) {
          Object.assign(p, finalData);
          if (p.stock <= p.minStock) {
            notifyProductEvent(`المخزون منخفض للمنتج: ${p.name}`, p.id);
          }
        } else {
          const newId = uid();
          State.data.products.push({ id: newId, ...finalData });
          notifyProductEvent(`تم إضافة منتج جديد: ${finalData.name}`, newId);
        }

        Store.save(); closeModal(); render(); toast('تم تحديث بيانات المنتج بنجاح ✅', 'success');
      };
    }

      Array.from(input.files).forEach(file => {

          window._prodImgs.push(e.target.result);

    function delProduct(id) { if (confirm('حذف المنتج؟')) { State.data.products = State.data.products.filter(p => p.id !== id); Store.save(); render(); toast('تم الحذف', 'success'); } }
    function importExcel() { toast('استيراد Excel - رفع الملف', 'info'); }
    function exportCSV(key) {
      const data = State.data[key]; if (!data?.length) return toast('لا توجد بيانات', 'warning');
      const headers = Object.keys(data[0]);
      const csv = [headers.join(','), ...data.map(r => headers.map(h => JSON.stringify(r[h] ?? '')).join(','))].join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = key + '.csv'; a.click();
      toast('تم التصدير', 'success');
    }

    POS.after = () => { renderPosList(); renderCart(); };
    function renderPosList() {
      const grid = document.getElementById('posList');
      const catBar = document.getElementById('posCats');
      const q = document.getElementById('posSearch')?.value.toLowerCase() || '';

      if (!grid) return;

      // 1. رسم شريط الفئات
      const categories = State.data.categories || [];
      const allCats = [{ id: 'all', name: 'الكل', ico: '📦' }, ...categories];
      if (catBar) {
        catBar.innerHTML = allCats.map(c => {
          const isActive = window.posCategory === c.id;
          return `
        <button onclick="window.posCategory='${c.id}'; renderPosList()" 
                class="px-4 py-2 rounded-2xl font-bold text-xs whitespace-nowrap transition-all flex items-center gap-2
                ${isActive ? 'bg-blue-600 text-white shadow-md shadow-blue-100' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}">
          ${c.name}
        </button>`;
        }).join('');
      }

      // 2. فلترة المنتجات بناءً على البحث والفئة المختارة
      const list = State.data.products.filter(p => {
        const matchesSearch = (p.name?.toLowerCase().includes(q) || p.sku?.toLowerCase().includes(q));
        const matchesCat = (window.posCategory === 'all' || p.cat === window.posCategory);
        return matchesSearch && matchesCat;
      });

      // 3. رسم البطاقات (مع منطق الضغط: صورة تزيد، اسم ينقص)
      grid.innerHTML = list.map(p => {
        const cartItem = cart.find(c => c.pid === p.id);
        const currentQty = cartItem ? cartItem.qty : 0;
        const firstImg = (p.images && p.images.length) ? p.images[0] : null;

        return `
    <div class="group relative bg-white rounded-3xl p-3 border border-slate-50 soft-shadow transition-all hover:scale-[1.02] active:scale-95 select-none">
      ${currentQty > 0 ? `
        <div class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-white z-10 shadow-lg">
          ${currentQty}
        </div>` : ''}

      <div onclick="updatePosAction('${p.id}', 1)" class="cursor-pointer mb-2 overflow-hidden rounded-2xl bg-slate-50 aspect-square flex items-center justify-center relative">

    window.updatePosAction = (pid, delta) => {
      const p = State.data.products.find(x => x.id === pid);
      if (!p) return;

      let it = cart.find(c => c.pid === pid);

      if (it) {
        it.qty += delta;
        // إذا وصلت الكمية لصفر، احذف المنتج من السلة
        if (it.qty <= 0) {
          cart = cart.filter(c => c.pid !== pid);
          toast(`تم حذف ${p.name} من السلة`, 'warning');
        } else {
          toast(delta > 0 ? `تمت إضافة ${p.name}` : `تم تقليل ${p.name}`, delta > 0 ? 'success' : 'info');
        }
      } else if (delta > 0) {
        // إضافة منتج جديد للسلة
        cart.push({ pid: p.id, name: p.name, price: p.price, qty: 1, marketingProfit: p.marketingProfit || 0 });
        toast(`أضيف ${p.name} للسلة ✅`, 'success');
      }

      Store.save();
      renderPosList(); // إعادة رسم قائمة المنتجات لتحديث العدادات
      renderCart();    // إعادة رسم الفاتورة على اليسار
    };

    function addToCart(pid) {
      const p = State.data.products.find(x => x.id === pid);
      const it = cart.find(c => c.pid === pid);
      if (it) it.qty++; else cart.push({ pid, name: p.name, price: p.price, qty: 1, marketingProfit: p.marketingProfit || 0 });
      renderCart();
    }

      const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);

    function autoFillCustomer() {
      const phone = (document.getElementById('cusPhone')?.value || '').trim();
      if (!phone) return;
      const c = State.data.customers.find(x => x.phone === phone);
      if (c) {
        document.getElementById('cusName').value = c.name || '';
        const govSel = document.getElementById('cusGov');
        if (govSel) govSel.value = c.gov || 'القاهرة';
        const addrEl = document.getElementById('cusAddress');
        if (addrEl) addrEl.value = c.address || '';
        if (window._lastAutoFillPhone !== phone) {
          window._lastAutoFillPhone = phone;
          toast('تم التعرف على العميل: ' + c.name + ' ✅', 'success');
        }
      }

    async function checkout() {
      if (!cart.length) return toast('السلة فارغة! 🛒', 'warning');

      const phone = (document.getElementById('cusPhone')?.value || '').trim();
      const name = (document.getElementById('cusName')?.value || 'عميل عابر').trim();
      const gov = document.getElementById('cusGov')?.value || 'القاهرة';
      const address = (document.getElementById('cusAddress')?.value || '').trim();
      const depositInput = document.getElementById('posDeposit');
      const depositValue = depositInput ? parseFloat(depositInput.value) : 0;

      let cu = State.data.customers.find(x => x.phone === phone && phone !== '');
      if (cu) {
        cu.name = name;
        cu.gov = gov;
        cu.address = address;
      } else if (phone !== '') {
        cu = { id: uid(), name, phone, gov, address, points: 0, total: 0 };
        State.data.customers.push(cu);
      }

      const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
      const ship = 50;
      const grandTotal = sub + ship;
      
      // تحديد معرف الموظف: في حالة المتجر الخاص، استخدم الموظف، وإلا استخدم المستخدم الحالي
      const salesmanId = State.storeMode ? State.storeEmployeeId : (State.user ? State.user.id : 'system');
      const salesman = State.data.users.find(u => u.id === salesmanId);
      
      const order = {
        id: uid(),
        code: 'ORD-' + (1000 + State.data.orders.length + 1),
        customerId: cu ? cu.id : null,
        customerName: name,
        customerPhone: phone,
        customerAddress: address,
        items: cart.map(c => ({ pid: c.pid, qty: c.qty, price: c.price })),
        total: grandTotal,
        status: 'pending',
        trackingNumber: '',
        gov,
        address,
        shipping: ship,
        date: now(),
        sellerName: salesman ? salesman.name : 'متجر أونلاين',
        sellerPhone: salesman ? salesman.phone || '' : '',
        salesmanId: salesmanId,
        paid: depositValue,
        remaining: grandTotal - depositValue
      };

      const whatsappPrepare = State.data.settings?.whatsappAutoSend ? prepareOrderWhatsApp(order, cu) : { popup: null, url: null };
      State.data.orders.unshift(order);
      notifyOrderEvent(order, `طلب جديد تم تسجيله: ${order.code}`);
      cart = [];
      await Store.save();
      closeModal();

      if (whatsappPrepare.popup && whatsappPrepare.url) {
        whatsappPrepare.popup.location = whatsappPrepare.url;
        toast(`تم حفظ الطلب ${order.code} وجاهز للإرسال عبر واتساب`, 'success');
      } else {
        toast(`تم حفظ الطلب بنجاح.. المدفوع: ${money(depositValue)}`, 'success');
      }
      render();
    }

    async function scanOrderTracking(id) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.capture = 'environment';
      input.style.display = 'none';
      input.onchange = async () => {
        const file = input.files?.[0];
        if (!file) return;
        if ('BarcodeDetector' in window) {
          try {
            const imgBitmap = await createImageBitmap(file);
            const detector = new BarcodeDetector({ formats: ['code_128', 'ean_13', 'ean_8', 'qr_code', 'code_39', 'code_93', 'upc_e', 'upc_a'] });
            const codes = await detector.detect(imgBitmap);
            if (codes.length) {
              updateOrderTracking(id, codes[0].rawValue || '');
              toast('تم قراءة رقم التتبع بنجاح', 'success');
              return;
            }
          } catch (e) {
            console.warn('Barcode scan failed', e);
          }
        }
        toast('لم يتم التعرف على الباركود. الرجاء إدخال الرقم يدوياً.', 'warning');
      };
      document.body.appendChild(input);
      input.click();
      input.remove();
    }

    function exportCustomersExcel() {
      const headers = ['كود العميل', 'الإسم', 'تليفون', 'تليفون إضافي', 'المحافظة', 'العنوان', 'إجمالي المشتريات', 'نقاط الولاء', 'تصنيف العميل'];
      const rows = State.data.customers.map(c => [
        c.code || '', c.name, c.phone || '', c.phone2 || '', c.gov || '', c.address || '', c.total || 0, c.points || 0, c.category || 'جديد'
      ]);

      const csvContent = "\ufeff" + [headers.join(','), ...rows.map(r => r.map(v => `"${v}"`).join(','))].join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'قائمة_العملاء.csv'; a.click();
    }

    function importCustomersExcel(input) {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const lines = e.target.result.split('\n').filter(l => l.trim());
        let imported = 0;
        lines.slice(1).forEach(line => {
          const cols = line.split(',').map(c => c.replace(/"/g, '').trim());
          if (!cols[1]) return; // يجب وجود الاسم

          const customerData = {
            id: uid(),
            code: cols[0] || ('CUS-' + (State.data.customers.length + imported + 1000)),
            name: cols[1],
            phone: cols[2] || '',
            phone2: cols[3] || '',
            gov: cols[4] || 'القاهرة',
            address: cols[5] || '',
            total: parseFloat(cols[6]) || 0,
            points: parseInt(cols[7]) || 0,
            category: cols[8] || 'جديد'
          };

          // إذا كان العميل موجوداً (برقم الهاتف)، قم بتحديثه
          const existing = State.data.customers.find(x => x.phone === customerData.phone && customerData.phone !== '');
          if (existing) Object.assign(existing, customerData);
          else { State.data.customers.push(customerData); imported++; }
        });
        Store.save(); render(); toast(`تم تحديث البيانات واستيراد ${imported} عملاء جدد ✅`, 'success');
      };
      reader.readAsText(file, 'UTF-8');
    }

    function ShippingCalc() {
      const companies = State.data.shippingCompanies || [];

      return `
  <div class="max-w-2xl mx-auto space-y-8">
    <div class="bg-white rounded-[2rem] p-8 border border-slate-100 soft-shadow">
      <div class="text-center mb-8">

                   class="w-full bg-slate-50 border-none rounded-2xl p-4 pl-12 font-black text-blue-600 focus:ring-2 focus:ring-blue-100">
          </div>
        </div>

        <!-- نتيجة الحساب (تظهر هنا) -->
        <div id="calcShipResult" class="pt-4">
            <div class="bg-slate-50 rounded-3xl p-8 border border-slate-100 text-center">
                <p class="text-slate-400 text-xs font-bold">يرجى اختيار شركة وتحديد الوزن لبدء الحساب</p>
            </div>
        </div>

    </div>

    <!-- قسم المقارنة السريعة -->

        <div class="relative z-10">
            <h4 class="font-black text-lg mb-2">مقارنة الأسعار</h4>
            <p class="text-blue-100 text-xs mb-6">تكلفة شحن نفس الوزن لدى الشركات الأخرى</p>
            <div id="calcComparison" class="space-y-3">
                <!-- قائمة المقارنة -->
            </div>
        </div>

    </div>
  </div>`;
    }

    window.runShippingCalc = () => {
      const coId = document.getElementById('calcShipCo')?.value;
      const weight = parseFloat(document.getElementById('calcShipWeight')?.value) || 0;
      const companies = State.data.shippingCompanies || [];
      const resultDiv = document.getElementById('calcShipResult');
      const compareDiv = document.getElementById('calcComparison');

      if (!coId) return;

      const sc = companies.find(x => x.id === coId);
      if (!sc) return;

      // منطق الحساب: (أول 2 كيلو بالسعر الأساسي + الزيادة لكل كيلو إضافي)
      const extraKg = Math.max(0, weight - 2);
      const extraCost = extraKg * sc.extraKgPrice;
      const total = sc.basePrice + extraCost;

      // عرض النتيجة الرئيسية
      resultDiv.innerHTML = `
    <div class="bg-blue-50 rounded-3xl p-6 border border-blue-100 animate-pop">
        <div class="flex justify-between items-center mb-4">
            <span class="text-blue-600 font-black text-sm uppercase">التكلفة الإجمالية</span>
            <span class="bg-blue-600 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase">مؤكد</span>
        </div>
        <div class="text-4xl font-black text-slate-800 mb-2">${money(total)}</div>
        <div class="flex items-center gap-2 text-slate-400 text-xs font-bold">
            <i data-lucide="info" class="w-3 h-3"></i>
            أساسي: ${money(sc.basePrice)} + وزن زائد: ${money(extraCost)}
        </div>
    </div>`;

      // عرض المقارنة مع الشركات الأخرى
      const otherCos = companies.filter(x => x.id !== coId);
      compareDiv.innerHTML = otherCos.map(osc => {
        const oExtraKg = Math.max(0, weight - 2);
        const oTotal = osc.basePrice + (oExtraKg * osc.extraKgPrice);
        const diff = oTotal - total;

        return `
    <div class="flex justify-between items-center bg-white/10 p-4 rounded-2xl backdrop-blur-sm">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 rounded-full ${diff > 0 ? 'bg-red-400' : 'bg-green-400'}"></div>
            <span class="font-bold text-sm text-blue-50">${osc.name}</span>
        </div>
        <div class="text-right">
            <div class="font-black text-sm">${money(oTotal)}</div>
            <div class="text-[9px] ${diff > 0 ? 'text-red-200' : 'text-green-200'} font-bold">
                ${diff > 0 ? '+' : ''}${money(diff)} فرق السعر
            </div>
        </div>
    </div>`;
      }).join('') || '<p class="text-blue-200 text-xs">لا توجد شركات أخرى للمقارنة</p>';

      if (typeof lucide !== 'undefined') lucide.createIcons();
    };

    function calcShip() {
      const base = +document.getElementById('scGov').value;
      const mult = +document.getElementById('scType').value;
      const w = +document.getElementById('scW').value;
      const cost = (base + (w > 1 ? (w - 1) * 15 : 0)) * mult;
      document.getElementById('scResult').innerHTML = `<div class="kpi" style="margin:0"><div class="ic" style="background:var(--primary)">💰</div><div><div class="label">تكلفة الشحن</div><div class="value">${money(cost)}</div></div></div>`;
    }

    /* ===========================================================
       19. FINANCE / EXPENSES / SUPPLIERS / COMMISSIONS
    =========================================================== */
    function Finance() {
      const sales = State.data.orders.reduce((s, o) => s + o.total, 0);
      const cogs = State.data.orders.reduce((s, o) => s + o.items.reduce((a, it) => { const p = State.data.products.find(x => x.id === it.pid); return a + (p ? p.cost * it.qty : 0) }, 0), 0);
      const exp = State.data.expenses.reduce((s, e) => s + e.amount, 0);
      const profit = sales - cogs - exp;
      return `<div class="grid cols-4 mb">
    ${kpi('💰', 'المبيعات', money(sales), '+12%', 'up', '#10b981')}
    ${kpi('📦', 'تكلفة البضاعة', money(cogs), '-', 'up', '#0ea5e9')}
    ${kpi('💸', 'المصروفات', money(exp), '-', 'down', '#ef4444')}
    ${kpi('📈', 'صافي الربح', money(profit), profit > 0 ? '+15%' : '-', 'up', '#6366f1')}
  </div>
  <div class="card"><h3>تقرير الربح والخسارة</h3>
    <table style="width:100%"><tbody>
      <tr><td>المبيعات</td><td class="text-end"><b style="color:var(--success)">${money(sales)}</b></td></tr>
      <tr><td>(-) تكلفة البضاعة المباعة</td><td class="text-end">${money(cogs)}</td></tr>
      <tr style="background:var(--surface-2)"><td><b>إجمالي الربح</b></td><td class="text-end"><b>${money(sales - cogs)}</b></td></tr>
      <tr><td>(-) المصروفات التشغيلية</td><td class="text-end">${money(exp)}</td></tr>
      <tr style="background:var(--primary-soft);font-size:18px"><td><b>صافي الربح</b></td><td class="text-end"><b style="color:var(--primary-2)">${money(profit)}</b></td></tr>
    </tbody></table>
  </div>`;
    }

    function addExpense() {
      modal(`<h2>+ مصروف جديد</h2>
    <form id="expForm">
      <div class="row"><label>النوع</label><select name="type"><option>رواتب</option><option>إعلانات</option><option>إيجار</option><option>مرافق</option><option>أخرى</option></select></div>

        return { s, count: ords.length, totalSales, commPercent, commValue };
