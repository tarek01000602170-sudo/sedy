function renderShop() {
      const grid = document.getElementById('shopGrid');
      const catBar = document.getElementById('shopCats');
      if (!grid) return;

      // 1. جلب المنتجات وتصفيتها فوراً لاستبعاد المخفي وغير المتوفر عن الزبائن
      let products = State.data.products || [];
      products = products.filter(p => p.isAvailable !== 'مخفي' && p.isAvailable !== 'لا');

      const categories = State.data.categories || [];
      const q = document.getElementById('shopS')?.value.toLowerCase() || '';

      // 2. شريط الفئات بشكل "Soft Chips"
      const allCats = [{ id: 'all', name: 'الكل' }, ...categories];
      if (catBar) {
        catBar.innerHTML = allCats.map(c => `
      <button onclick="window.shopCategory='${c.id}'; renderShop()" 
        class="px-6 py-3 rounded-2xl font-black text-xs whitespace-nowrap transition-all
        ${window.shopCategory === c.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'bg-white text-slate-500 hover:bg-slate-50 border border-slate-100'}">
        ${c.name}
      </button>
    `).join('');
      }

      // 2. فلترة المنتجات
      /* داخل دالة renderShop */

      // تحديث سطر الفلترة (list) ليكون هكذا:
      const list = products.filter(p => {
        const name = p.name ? p.name.toLowerCase() : '';
        const matchesSearch = name.includes(q);
        const matchesCat = (window.shopCategory === 'all' || p.cat === window.shopCategory);

        // تعديل: إظهار المنتج طالما أنه "متوفر للبيع" حتى لو المخزون صفر (ليراه العميل ويطلبه)
        const isVisible = (p.isAvailable !== false);

        return matchesSearch && matchesCat && isVisible;
      });

      // 3. رسم البطاقات الاحترافية
      grid.innerHTML = list.map(p => {
        const cartItem = cart.find(c => c.pid === p.id);
        const currentQty = cartItem ? cartItem.qty : 0;
        const firstImg = (p.images && p.images.length) ? p.images[0] : null;
        const qtyOptions = Math.max(20, currentQty, p.stock || 0);
        const cardDesc = p.shortDesc || '';

        return `
    <div class="group shop-card bg-white rounded-[2rem] p-3 border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 overflow-hidden">
      <div class="absolute top-0 right-0 w-28 h-28 bg-blue-50 rounded-full -mr-12 -mt-12 transition-all group-hover:scale-[2.8] group-hover:opacity-20"></div>

      <div onclick="showProductDetails('${p.id}')" class="shop-card-image relative z-10 cursor-pointer overflow-hidden rounded-[1.75rem] bg-slate-50 shadow-sm aspect-[4/5] flex items-center justify-center mb-3">
        ${firstImg ?
            `<img src="${firstImg}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">` :
            `<div class="text-5xl opacity-30">${p.img || '📦'}</div>`
          }
      </div>

<div class="relative z-10 space-y-3 px-1">
        <div>
          <h4 class="font-black text-slate-800 text-lg leading-tight line-clamp-2">${p.name}</h4>
          ${cardDesc ? `<p class="text-sm text-slate-500 mt-2 line-clamp-2">${cardDesc}</p>` : ''}
        </div>

        <div class="flex items-center justify-between gap-3">
          <div>
            <span class="text-[10px] text-slate-400 uppercase tracking-[0.25em] font-black">السعر</span>
            <div class="text-2xl font-black text-slate-900">${money(p.price)}</div>
          </div>
          </div>

        <div class="flex items-center justify-between gap-2 bg-slate-100 rounded-2xl p-2 border border-slate-200">
          <button onclick="changeShopQty('${p.id}', -1)" class="w-9 h-9 rounded-xl bg-white shadow-sm flex items-center justify-center text-slate-600 hover:bg-red-50 hover:text-red-500 transition-all active:scale-95">
            <i data-lucide="minus" class="w-4 h-4"></i>
          </button>
          <select id="shopQty_${p.id}" onchange="setShopQuantity('${p.id}', this.value)" class="flex-1 bg-white border border-slate-200 rounded-2xl px-3 py-2 text-center font-black text-sm focus:ring-2 focus:ring-blue-100">
            ${Array.from({ length: qtyOptions }, (_, i) => {
              const qtyVal = i + 1;
              return `<option value="${qtyVal}" ${currentQty === qtyVal ? 'selected' : ''}>${qtyVal}</option>`;
            }).join('')}
          </select>
          <button onclick="changeShopQty('${p.id}', 1)" class="w-9 h-9 rounded-xl bg-white shadow-sm flex items-center justify-center text-blue-600 hover:bg-blue-600 hover:text-white transition-all active:scale-95">
            <i data-lucide="plus" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
    </div>`;
      }).join('');

      // الزر العائم للسلة للموبايل
      renderFloatingCart();

      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    // دالة منفصلة لرسم زر السلة العائم لضمان عدم التكرار
    function renderFloatingCart() {
      const totalInCart = cart.reduce((s, c) => s + c.qty, 0);
      const existingFloatingCart = document.querySelector('.floating-cart');
      if (existingFloatingCart) existingFloatingCart.remove();

      if (totalInCart > 0) {
        const cartTotalMoney = cart.reduce((s, c) => s + c.price * c.qty, 0);
        const html = `
            <div class="floating-cart" onclick="State.page='cart';render()" style="position: fixed; bottom: 85px; inset-inline-end: 20px; background: #10b981; color: #fff; padding: 12px 25px; border-radius: 50px; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 10px; font-weight: bold; z-index: 1000; cursor: pointer;">
                🛒 السلة (${totalInCart}) - ${money(cartTotalMoney)}
            </div>`;
        document.body.insertAdjacentHTML('beforeend', html);
      }
    }

    // دالة الفلترة
    window.filterShopByCat = (catId) => {

    function addToCartQty(pid) {
      const qty = parseInt(document.getElementById('qty_' + pid)?.value || 1);
      const p = State.data.products.find(x => x.id === pid);
      const it = cart.find(c => c.pid === pid);
      if (it) it.qty += qty; else cart.push({ pid, name: p.name, price: p.price, qty });
      toast('أُضيف للسلة 🛒', 'success');
    }
    function Cart() {
      const visibleOrders = getVisibleOrders();
      const employee = State.user && State.user.role !== 'customer' && State.user.role !== undefined;
      const pendingOrders = visibleOrders.filter(o => ['pending', 'processing', 'packed', 'shipped'].includes(o.status));
      const deliveredOrders = visibleOrders.filter(o => o.status === 'delivered');
      const pendingProfit = pendingOrders.reduce((s, o) => s + orderProfit(o), 0);
      const deliveredProfit = deliveredOrders.reduce((s, o) => s + orderProfit(o), 0);
      const reservedItems = pendingOrders.flatMap(o => o.items.map(it => ({ pid: it.pid, qty: it.qty })));
      const groupedReserved = reservedItems.reduce((acc, item) => {
        const key = item.pid;
        acc[key] = acc[key] || { pid: item.pid, qty: 0 };
        acc[key].qty += item.qty;
        return acc;
      }, {});
      const reservedHtml = Object.values(groupedReserved).map(item => {
        const prod = State.data.products.find(x => x.id === item.pid) || {};
        return `<div class="flex between" style="padding:10px 0;border-bottom:1px solid var(--border)"><div>${prod.name || 'منتج محذوف'}</div><div class="muted">${item.qty} قطعة</div></div>`;
      }).join('') || '<div class="muted">لا توجد منتجات محفوظة</div>';

      const cartHtml = cart.length ? (() => {
        const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
        return `<div class="card"><h3>🛒 سلة التسوق</h3>
      ${cart.map((c, i) => `<div class="flex between" style="padding:14px 0;border-bottom:1px solid var(--border)">
        <div style="flex:1"><b>${c.name}</b><div class="muted">${money(c.price)}</div></div>
        <div class="flex">
          <button class="btn sm" onclick="cart[${i}].qty=Math.max(1,cart[${i}].qty-1);render()">−</button>
          <b>${c.qty}</b>
          <button class="btn sm" onclick="cart[${i}].qty++;render()">+</button>
          <button class="btn sm danger" onclick="cart.splice(${i},1);render()">×</button>
        </div></div>`).join('')}
      <div style="font-size:20px;text-align:end;margin-top:14px"><b>الإجمالي: ${money(sub + 50)}</b></div>
      <button class="btn primary" style="width:100%;justify-content:center;padding:14px;margin-top:14px" onclick="checkoutCustomer()">إتمام الشراء</button></div>`;
      })() : `<div class="card" style="text-align:center;padding:60px"><div style="font-size:60px">🛒</div><h3>السلة فارغة</h3><button class="btn primary" onclick="State.page='shop';render()">تسوق الآن</button></div>`;

      if (!cart.length && !employee) return cartHtml;

      return `<div class="grid gap-8 ${employee ? 'lg:grid-cols-[1.4fr_0.9fr]' : ''}">
        ${employee ? `<div class="card">
          <h3>📊 ملخص المبيعات الخاصة بك</h3>
          <div class="grid grid-cols-2 gap-4 mt-6">
            <div class="bg-slate-50 rounded-3xl p-5 text-center">
              <div class="muted text-[11px] uppercase tracking-wider mb-2">الطلبات المعلقة</div>
              <div class="text-2xl font-black">${fmt(pendingOrders.length)}</div>
              <div class="muted text-[11px] mt-2">أرباح متوقعة ${money(pendingProfit)}</div>
            </div>
            <div class="bg-slate-50 rounded-3xl p-5 text-center">
              <div class="muted text-[11px] uppercase tracking-wider mb-2">الطلبات المسلمة</div>
              <div class="text-2xl font-black">${fmt(deliveredOrders.length)}</div>
              <div class="muted text-[11px] mt-2">أرباح محققة ${money(deliveredProfit)}</div>
            </div>
          </div>
          <div class="mt-6"><h4 class="font-black">المنتجات المحفوظة الآن</h4>${reservedHtml}</div>
        </div>` : ''}
        ${cartHtml}
      </div>`;
    }
    function checkoutCustomer() {
      if (!cart.length) return toast('السلة فارغة! 🛒', 'warning');
      modal(`
    <div class="space-y-4 text-right" dir="rtl">
      <h2 class="text-xl font-black">تأكيد الطلب</h2>
      <p class="muted">أدخل بياناتك حتى يتم حفظ الطلب وإرسال تفاصيله إلى البائع عبر واتساب.</p>
      <form id="checkoutCustomerForm">
        <div class="row"><label>اسم العميل</label><input name="name" required class="w-full rounded-2xl p-3 bg-slate-50 border border-slate-200"></div>
        <div class="row"><label>رقم الهاتف</label><input name="phone" required class="w-full rounded-2xl p-3 bg-slate-50 border border-slate-200"></div>
        <div class="row"><label>المحافظة</label><select name="gov" class="w-full rounded-2xl p-3 bg-slate-50 border border-slate-200">${GOVS.map(g => `<option value="${g}">${g}</option>`).join('')}</select></div>
        <div class="row"><label>العنوان</label><textarea name="address" rows="3" class="w-full rounded-2xl p-3 bg-slate-50 border border-slate-200"></textarea></div>
        <div class="modal-actions">
          <button class="btn primary" type="submit">إرسال الطلب</button>
          <button type="button" class="btn ghost" onclick="closeModal()">إلغاء</button>
        </div>
      </form>
    </div>
  `);
      const form = document.getElementById('checkoutCustomerForm');
      if (form) {
        form.onsubmit = async (e) => {
          e.preventDefault();
          const fd = new FormData(form);
          const name = (fd.get('name') || '').toString().trim();
          const phone = (fd.get('phone') || '').toString().trim();
          const gov = fd.get('gov') || 'القاهرة';
          const address = (fd.get('address') || '').toString().trim();

          let cu = State.data.customers.find(x => x.phone === phone && phone !== '');
          if (cu) {
            cu.name = name;
            cu.gov = gov;
            cu.address = address;
          } else {
            cu = { id: uid(), name, phone, gov, address, points: 0, total: 0 };
            State.data.customers.push(cu);
          }

          const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
          
          // تحديد معرف الموظف: في حالة المتجر الخاص، استخدم الموظف، وإلا استخدم معرف المرجع
          let salesmanId = State.storeMode ? State.storeEmployeeId : (sessionStorage.getItem('referredSellerId') || 'online');
          const salesman = State.data.users.find(u => u.id === salesmanId);
          
          const order = {
            id: uid(),
            code: 'WEB-' + (1000 + State.data.orders.length + 1),
            customerId: cu.id,
            customerName: name,
            customerPhone: phone,
            customerAddress: address,
            items: cart.map(c => ({ pid: c.pid, qty: c.qty, price: c.price, marketingProfit: c.marketingProfit || 0 })),
            total: sub + 50,
            status: 'pending',
            trackingNumber: '',
            gov,
            address,
            shipping: 50,
            date: now(),
            salesmanId: salesmanId,
            sellerName: salesman ? salesman.name : 'متجر أونلاين مباشر',
            sellerPhone: salesman ? salesman.phone || '' : '',
            paid: 0,
            remaining: sub + 50
          };

          const whatsappPrepare = State.data.settings?.whatsappAutoSend ? prepareOrderWhatsApp(order, cu) : { popup: null, url: null };
          State.data.orders.unshift(order);
          notifyOrderEvent(order, `تم إنشاء طلب ويب جديد ${order.code}`);
          cart = [];
          await Store.save();
          closeModal();

          if (whatsappPrepare.popup && whatsappPrepare.url) {
            whatsappPrepare.popup.location = whatsappPrepare.url;
            toast(`تم حفظ الطلب ${order.code} وجاهز للإرسال عبر واتساب`, 'success');
          } else {
            toast('تم استلام طلبك بنجاح وسيتواصل معك البائع ✅', 'success');
          }
          State.page = 'shop';
          render();
        };
      }
    }

    // وظائف مساعدة للمعرض والزوم
    window.changeMainImg = (el, src) => {

      el.classList.add('active');
    };

    window.zoomImg = (e) => {
      const img = document.getElementById('productMainImg');
      if (!img) return;
      const { left, top, width, height } = e.currentTarget.getBoundingClientRect();
      const x = ((e.pageX - left - window.scrollX) / width) * 100;
      const y = ((e.pageY - top - window.scrollY) / height) * 100;
      img.style.transformOrigin = `${x}% ${y}%`;
    };

    window.resetZoom = () => {
      const img = document.getElementById('productMainImg');
      if (img) img.style.transformOrigin = `center center`;

      const qtySelect = document.getElementById('detailQty');
      let qty = qtySelect ? Math.max(1, parseInt(qtySelect.value || '1')) : 1;
      const p = State.data.products.find(x => x.id === pid);
      const it = cart.find(c => c.pid === pid);
      if (it) it.qty += qty; else cart.push({ pid, name: p.name, price: p.price, qty, marketingProfit: p.marketingProfit || 0 });
      closeModal();
      toast('تمت الإضافة للسلة', 'success');
      render(); // لتحديث العداد في الصفحة الرئيسية
    };

    window.ensureDetailQtyOptions = (qtySelect, qty) => {
      if (!qtySelect) return;
      let maxQty = parseInt(qtySelect.dataset.max || '20');
      qty = Math.max(1, qty);
      if (qty > maxQty) {
        maxQty = Math.max(qty, maxQty + 20);
        qtySelect.dataset.max = maxQty;
        qtySelect.innerHTML = Array.from({ length: maxQty }, (_, i) => `<option value="${i + 1}">${i + 1}</option>`).join('');
      }
      qtySelect.value = qty;
    };

    window.changeDetailQty = (delta) => {
      const qtySelect = document.getElementById('detailQty');
      if (!qtySelect) return;
      let qty = parseInt(qtySelect.value || '1');
      qty = Math.max(1, qty + delta);
      ensureDetailQtyOptions(qtySelect, qty);
    };

    window.syncDetailQty = (value) => {
      const qtySelect = document.getElementById('detailQty');
      if (!qtySelect) return;
      let qty = Math.max(1, parseInt(value || '1'));
      ensureDetailQtyOptions(qtySelect, qty);
    };

    /* ===========================================================
       23. BOOTSTRAP
    =========================================================== */
    // بدلاً من السطر القديم، استخدم هذا:
    Store.load().then(() => {
      Auth.restore();
      initializeStoreMode();
      render();
    });

    /* Firebase placeholder — when you add real config:
       import { initializeApp } from 'firebase/app';
       import { getAuth, ... } from 'firebase/auth';
       import { getFirestore, onSnapshot, ... } from 'firebase/firestore';
       const app = initializeApp(FIREBASE_CONFIG);
       ... wire onSnapshot to State.data and call render()
    */
    function showProductDetails(pid) {
      // البحث عن المنتج
      const p = State.data.products.find(x => x.id === pid);

      // إذا لم يجد المنتج، يظهر تنبيه ويغلق
      if (!p) {
        console.error("Product not found ID:", pid);
        toast("عذراً، تعذر تحميل بيانات المنتج", "danger");
        return;
      }

      // التأكد من وجود مصفوفة الصور
      const images = Array.isArray(p.images) ? p.images.filter(Boolean) : [];
      const mainImgSrc = images.length > 0 ? images[0] : '';
      const hasGallery = images.length > 1;

      const thumbnailsHtml = hasGallery ? `
          <div class="thumb-list" aria-label="معرض صور المنتج">
            ${images.map((img, i) => `
              <img src="${img}" class="thumb-item ${i === 0 ? 'active' : ''}" alt="صورة المنتج ${i + 1}" onclick="changeMainImg(this, '${img}')">
            `).join('')}
          </div>
        ` : '';

      const catName = State.data.categories.find(c => c.id === p.cat)?.name || 'عام';
      const currentQty = cart.find(c => c.pid === p.id)?.qty || 1;
      const qtyOptions = Math.max(20, currentQty, p.stock || 0);

      modal(`
    <div class="product-modal-content text-right" dir="rtl">
      <div class="product-modal-card bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-lg">
        <button type="button" class="product-modal-close" onclick="closeModal()" aria-label="Close">×</button>
        <div class="grid grid-cols-1 lg:grid-cols-[1.05fr_0.95fr] gap-6 p-6">
          <div class="product-modal-right space-y-5">
            <div class="main-img-container bg-slate-50 overflow-hidden rounded-[1.75rem] aspect-[4/5] flex items-center justify-center relative group" onmousemove="zoomImg(event)" onmouseleave="resetZoom()">
              ${mainImgSrc ? `<img src="${mainImgSrc}" id="productMainImg" class="w-full h-full object-cover transition-transform duration-500" alt="صورة المنتج الرئيسية">` : `<div class="text-8xl opacity-10">${p.img || '📦'}</div>`}
            </div>

            ${thumbnailsHtml}

            <div class="bg-slate-50 rounded-3xl border border-slate-100 p-4 shadow-inner">
              <div class="text-[10px] text-slate-400 uppercase tracking-[0.25em] font-black mb-2">السعر</div>
              <div class="text-2xl font-black text-blue-600">${money(p.price)}</div>
            </div>

<div class="grid gap-3 sm:grid-cols-[1fr_auto] items-center">
              <div class="flex flex-col gap-3">
                <div class="flex items-center justify-between gap-2 bg-slate-100 rounded-2xl p-2 border border-slate-200">
                  <button onclick="changeDetailQty(-1)" class="w-11 h-11 rounded-2xl bg-white shadow-sm flex items-center justify-center text-slate-600 hover:bg-red-50 hover:text-red-500 transition-all active:scale-95">
                    <i data-lucide="minus" class="w-4 h-4"></i>
                  </button>
                  <select id="detailQty" data-max="${qtyOptions}" onchange="syncDetailQty(this.value)" class="flex-1 bg-white border border-slate-200 rounded-2xl px-3 py-2 text-center font-black text-sm focus:ring-2 focus:ring-blue-100">
                    ${Array.from({ length: qtyOptions }, (_, i) => `<option value="${i + 1}" ${currentQty === i + 1 ? 'selected' : ''}>${i + 1}</option>`).join('')}
                  </select>
                  <button onclick="changeDetailQty(1)" class="w-11 h-11 rounded-2xl bg-white shadow-sm flex items-center justify-center text-blue-600 hover:bg-blue-600 hover:text-white transition-all active:scale-95">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                  </button>
                </div>
                </div>

              <button onclick="addToCartFromDetail('${p.id}')" class="btn primary w-full max-w-[160px] rounded-3xl px-3 py-3 text-xs font-black shadow-sm">أضف إلى السلة</button>
            </div>
          </div>
          <div class="product-modal-left flex flex-col justify-between gap-5">
            <div class="space-y-4">
              <span class="inline-flex items-center rounded-full bg-blue-50 text-blue-600 px-3 py-1 text-[10px] font-black uppercase tracking-[0.3em] border border-blue-100">${catName}</span>
              <h2 class="text-3xl font-black text-slate-900 leading-tight">${p.name || 'منتج بدون اسم'}</h2>
              <p class="text-slate-600 text-sm leading-relaxed font-medium">
                ${p.fullDesc || p.shortDesc || 'لا توجد تفاصيل إضافية لهذا المنتج.'}
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  `);

      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    // وظيفة تبديل الصورة الرئيسية
    window.changeMainImg = (el, src) => {
      const mainImg = document.getElementById('productMainImg');
      if (mainImg) mainImg.src = src;
      document.querySelectorAll('.thumb-item').forEach(t => t.style.borderColor = 'transparent');
      el.style.borderColor = 'var(--primary)';
    };

    // وظيفة الزوم (Zoom)
    window.zoomImg = (e) => {
      const img = document.getElementById('productMainImg');
      if (!img) return;
      const { left, top, width, height } = e.currentTarget.getBoundingClientRect();
      const x = ((e.pageX - left - window.scrollX) / width) * 100;
      const y = ((e.pageY - top - window.scrollY) / height) * 100;
      img.style.transformOrigin = `${x}% ${y}%`;
      img.style.transform = "scale(2)";
    };

    window.resetZoom = () => {
      const img = document.getElementById('productMainImg');
      if (img) {
        img.style.transform = "scale(1)";
        img.style.transformOrigin = `center center`;
      }
    };

    window.addToCartFromDetail = (pid) => {
      const qtySelect = document.getElementById('detailQty');
      const maxQty = qtySelect ? parseInt(qtySelect.dataset.max || '1') : 1;
      let qty = qtySelect ? parseInt(qtySelect.value || '1') : 1;
      qty = Math.max(1, Math.min(qty, maxQty));
      const p = State.data.products.find(x => x.id === pid);
      const it = cart.find(c => c.pid === pid);
      if (it) it.qty += qty; else cart.push({ pid, name: p.name, price: p.price, qty, marketingProfit: p.marketingProfit || 0 });
      closeModal();
      toast('تمت الإضافة للسلة ✅', 'success');
      render();
    };

    window.updateAutoCart = (pid, delta) => {
      const p = State.data.products.find(x => x.id === pid);
      if (!p) return;

      let it = cart.find(c => c.pid === pid);

      if (it) {
        it.qty += delta;
        if (it.qty <= 0) {
          cart = cart.filter(c => c.pid !== pid);
        }
      } else if (delta > 0) {
        cart.push({ pid: p.id, name: p.name, price: p.price, qty: 1, marketingProfit: p.marketingProfit || 0 });
      }

      // حفظ وتحديث الواجهة فوراً
      Store.save();
      renderShop(); // نقوم بتحديث جزء المتجر فقط ليكون أسرع من تحديث التطبيق بالكامل

      // إذا أردت تحديث عداد السلة في التوب بار أيضاً:
      const cartBadge = document.querySelector('.topbar .badge');
      if (cartBadge) {
        const total = cart.reduce((s, c) => s + c.qty, 0);
        cartBadge.textContent = total;
        cartBadge.style.display = total > 0 ? 'block' : 'none';
      }
    };

    window.setShopQuantity = (pid, value) => {
      const p = State.data.products.find(x => x.id === pid);
      if (!p) return;
      const qty = Math.max(1, parseInt(value, 10) || 1);
      const it = cart.find(c => c.pid === pid);
      if (it) {
        it.qty = qty;
      } else {
        cart.push({ pid: p.id, name: p.name, price: p.price, qty, marketingProfit: p.marketingProfit || 0 });
      }
      Store.save();
      renderShop();
      const cartBadge = document.querySelector('.topbar .badge');
      if (cartBadge) {
        const total = cart.reduce((s, c) => s + c.qty, 0);
        cartBadge.textContent = total;
        cartBadge.style.display = total > 0 ? 'block' : 'none';
      }
    };

    window.changeShopQty = (pid, delta) => {
      const p = State.data.products.find(x => x.id === pid);
      if (!p) return;
      const it = cart.find(c => c.pid === pid);
      const qty = it ? it.qty + delta : Math.max(1, delta);
      if (it) {
        it.qty = qty;
        if (it.qty <= 0) {
          cart = cart.filter(c => c.pid !== pid);
        }
      } else if (delta > 0) {
        cart.push({ pid: p.id, name: p.name, price: p.price, qty, marketingProfit: p.marketingProfit || 0 });
      }
      Store.save();
      renderShop();
      const cartBadge = document.querySelector('.topbar .badge');
      if (cartBadge) {
        const total = cart.reduce((s, c) => s + c.qty, 0);
        cartBadge.textContent = total;
        cartBadge.style.display = total > 0 ? 'block' : 'none';
      }
    };

    // PWA Service Worker Registration
    async function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) return;

      try {
        const registration = await navigator.serviceWorker.register('/sw.js');
        console.log('Service Worker registered successfully:', registration.scope);

        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              toast('تم تحديث التطبيق! أعد تحميل الصفحة للحصول على أحدث التحديثات', 'info');
            }
          });
        });
      } catch (error) {
        console.error('Service Worker registration failed:', error);
      }
    }

    registerServiceWorker();

    // PWA Install Prompt
    let deferredPrompt;
    const installButton = document.createElement('button');
    installButton.id = 'pwa-install-btn';
    installButton.className = 'fixed bottom-4 left-4 bg-blue-600 text-white px-4 py-2 rounded-lg shadow-lg z-50';
    installButton.style.display = 'block';
    installButton.textContent = 'تثبيت التطبيق';
    document.body.appendChild(installButton);

    installButton.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const choiceResult = await deferredPrompt.userChoice;
        if (choiceResult.outcome === 'accepted') {
          console.log('User accepted the install prompt');
          toast('شكرًا! التطبيق جاهز للتثبيت.', 'success');
        } else {
          toast('تم رفض التثبيت أو لم يتم الاختيار.', 'info');
        }
        deferredPrompt = null;
      } else {
        toast('التثبيت غير متاح الآن. أعد تحميل الصفحة أو افتحها في Chrome/Edge المدعوم.', 'warning');
      }
    });

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installButton.style.display = 'block';
    });

    // Hide install button when app is installed
    window.addEventListener('appinstalled', () => {
      installButton.style.display = 'none';
      toast('تم تثبيت التطبيق بنجاح!', 'success');
    });

    // Push Notifications Setup
    async function requestNotificationPermission() {
      if ('Notification' in window && 'serviceWorker' in navigator) {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          console.log('Notification permission granted');
          return true;
        }
      }
      return false;
    }

    // Initialize PWA features
    async function initPWA() {
      // Request notification permission on first visit
      if (!localStorage.getItem('notificationsRequested')) {
        setTimeout(async () => {
          const granted = await requestNotificationPermission();
          if (granted) {
            localStorage.setItem('notificationsRequested', 'true');
          }
        }, 3000); // Wait 3 seconds after page load
      }

      // Handle online/offline status
      window.addEventListener('online', () => {
        toast('تم استعادة الاتصال بالإنترنت', 'success');
        // Sync any pending data
        if (typeof Store !== 'undefined' && Store.save) {
          Store.save();
        }
      });

      window.addEventListener('offline', () => {
        toast('أنت الآن غير متصل بالإنترنت. سيتم حفظ البيانات محلياً', 'warning');
      });
    }

    // Call PWA initialization
    initPWA();

  </script>
</body>

</html>
