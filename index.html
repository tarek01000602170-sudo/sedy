<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>نظام ERP + متجر + CRM</title>
  <!-- استدعاء مكتبات Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <link rel="manifest"
    href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22ERP%20System%22%2C%22short_name%22%3A%22ERP%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230b1220%22%2C%22theme_color%22%3A%22%230ea5e9%22%2C%22icons%22%3A%5B%5D%7D">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- =========================================================
     INTERNAL CSS — Design System
========================================================= -->
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #0ea5e9;
      --primary-2: #0284c7;
      --primary-soft: #e0f2fe;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #6366f1;
      --shadow: 0 4px 14px rgba(15, 23, 42, .06);
      --shadow-lg: 0 10px 30px rgba(15, 23, 42, .12);
      --radius: 14px;
      --sidebar-w: 260px;
    }

    html.dark {
      --bg: #0b1220;
      --surface: #111a2e;
      --surface-2: #0f1729;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #1f2a44;
      --primary: #38bdf8;
      --primary-2: #0ea5e9;
      --primary-soft: #0c2740;
      --shadow: 0 4px 14px rgba(0, 0, 0, .4);
      --shadow-lg: 0 10px 30px rgba(0, 0, 0, .5);
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cairo', 'Inter', system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased
    }

    html[dir="ltr"] body {
      font-family: 'Inter', 'Cairo', system-ui, sans-serif
    }

    a {
      color: inherit;
      text-decoration: none
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit
    }

    /* تنسيقات معرض الصور والزوم */
    .product-gallery {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .main-img-container {
      width: 100%;
      height: 300px;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      position: relative;
      cursor: zoom-in;
    }

    .main-img-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .main-img-container:hover img {
      transform: scale(1.8);
    }

    /* قوة الزوم */

    .thumb-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 5px 0;
    }

    .thumb-item {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      object-fit: cover;
    }

    .thumb-item.active {
      border-color: var(--primary);
    }

    /* زر السلة العائم للموبايل */
    .floating-cart {
      position: fixed;
      bottom: 85px;
      inset-inline-end: 20px;
      background: var(--success);
      color: #fff;
      padding: 12px 20px;
      border-radius: 30px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      z-index: 40;
      cursor: pointer;
    }

    input,
    select,
    textarea {
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      width: 100%;
      outline: none;
      transition: .2s
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft)
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px
    }

    /* Layout */
    .app {
      display: flex;
      min-height: 100vh
    }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-inline-end: 1px solid var(--border);
      position: fixed;
      inset-block: 0;
      inset-inline-start: 0;
      display: flex;
      flex-direction: column;
      transition: .3s;
      z-index: 50
    }

    html[dir="ltr"] .sidebar {
      border-inline-end: 1px solid var(--border);
      border-inline-start: none
    }

    .sidebar .brand {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border)
    }

    .sidebar .brand .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--info));
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900
    }

    .sidebar .brand .name {
      font-weight: 900;
      font-size: 16px
    }

    .sidebar .nav {
      flex: 1;
      overflow: auto;
      padding: 12px
    }

    .sidebar .nav .group {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 14px 12px 6px;
      font-weight: 700
    }

    .sidebar .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 2px;
      transition: .2s;
      font-size: 13.5px
    }

    .sidebar .nav a:hover {
      background: var(--surface-2);
      color: var(--text)
    }

    .sidebar .nav a.active {
      background: var(--primary-soft);
      color: var(--primary-2)
    }

    .sidebar .nav a .ico {
      width: 20px;
      text-align: center
    }

    .sidebar .user {
      padding: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px
    }

    .sidebar .user .av {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800
    }

    .main {
      flex: 1;
      margin-inline-start: var(--sidebar-w);
      min-width: 0
    }

    html[dir="ltr"] .main {
      margin-inline-start: var(--sidebar-w);
      margin-inline-end: 0
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .topbar h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800
    }

    .topbar .spacer {
      flex: 1
    }

    .topbar .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--surface-2);
      display: grid;
      place-items: center;
      color: var(--text);
      position: relative
    }

    .topbar .icon-btn .badge {
      position: absolute;
      top: 4px;
      inset-inline-start: 4px;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 5px
    }

    .menu-toggle {
      display: none
    }

    .content {
      padding: 20px;
      max-width: 1500px;
      margin: auto
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px
    }

    .card h3 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 800
    }

    .grid {
      display: grid;
      gap: 16px
    }

    .grid.cols-4 {
      grid-template-columns: repeat(4, 1fr)
    }

    .grid.cols-3 {
      grid-template-columns: repeat(3, 1fr)
    }

    .grid.cols-2 {
      grid-template-columns: repeat(2, 1fr)
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: .25s
    }

    .kpi:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg)
    }

    .kpi .ic {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 22px;
      color: #fff
    }

    .kpi .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600
    }

    .kpi .value {
      font-size: 22px;
      font-weight: 900;
      margin-top: 2px
    }

    .kpi .delta {
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px
    }

    .kpi .delta.up {
      color: var(--success)
    }

    .kpi .delta.down {
      color: var(--danger)
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13.5px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      transition: .2s
    }

    .btn:hover {
      transform: translateY(-1px)
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      border: none;
      box-shadow: 0 4px 12px rgba(14, 165, 233, .35)
    }

    .btn.success {
      background: var(--success);
      color: #fff;
      border: none
    }

    .btn.danger {
      background: var(--danger);
      color: #fff;
      border: none
    }

    .btn.ghost {
      background: transparent
    }

    .btn.sm {
      padding: 6px 10px;
      font-size: 12px
    }

    /* Tables */
    .table-wrap {
      overflow: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface)
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px
    }

    th,
    td {
      padding: 12px 14px;
      text-align: start;
      border-bottom: 1px solid var(--border);
      font-size: 13px
    }

    th {
      background: var(--surface-2);
      font-weight: 800;
      color: var(--muted);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    tbody tr:hover {
      background: var(--surface-2)
    }

    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700
    }

    .tag.pending {
      background: #fef3c7;
      color: #92400e
    }

    .tag.processing {
      background: #dbeafe;
      color: #1e40af
    }

    .tag.packed {
      background: #ede9fe;
      color: #5b21b6
    }

    .tag.shipped {
      background: #cffafe;
      color: #155e75
    }

    .tag.delivered {
      background: #d1fae5;
      color: #065f46
    }

    .tag.returned {
      background: #fee2e2;
      color: #991b1b
    }

    .tag.cancelled {
      background: #e2e8f0;
      color: #334155
    }

    html.dark .tag {
      filter: brightness(.85) saturate(1.3)
    }

    /* Modals */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px
    }

    .modal-bg.open {
      display: flex;
      animation: fade .2s
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow: auto;
      padding: 22px;
      box-shadow: var(--shadow-lg);
      animation: pop .25s
    }

    .modal h2 {
      margin: 0 0 16px;
      font-size: 18px
    }

    .modal .row {
      margin-bottom: 12px
    }

    .modal .row label {
      display: block;
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 6px;
      color: var(--muted)
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px
    }

    .qty-auto-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--surface-2);
      padding: 8px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .qty-btn-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .qty-btn-circle:hover {
      transform: scale(1.1);
      background: var(--primary-2);
    }

    .qty-btn-circle.minus {
      background: var(--muted);
    }

    .qty-val {
      font-weight: 800;
      font-size: 16px;
      min-width: 25px;
      text-align: center;
    }

    @keyframes fade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(.95)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    /* Toast */
    .toast-host {
      position: fixed;
      bottom: 20px;
      inset-inline-start: 20px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      box-shadow: var(--shadow-lg);
      font-weight: 600;
      animation: slide .25s;
      border-inline-start: 4px solid var(--primary)
    }

    .toast.success {
      border-color: var(--success)
    }

    .toast.danger {
      border-color: var(--danger)
    }

    .toast.warning {
      border-color: var(--warning)
    }

    @keyframes slide {
      from {
        transform: translateY(20px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    /* Login */
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
      padding: 20px
    }

    .login-card {
      background: var(--surface);
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      padding: 32px;
      box-shadow: var(--shadow-lg)
    }

    .login-card .logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--info));
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      font-size: 22px
    }

    .login-card h1 {
      margin: 0 0 6px;
      text-align: center;
      font-size: 22px
    }

    .login-card p {
      margin: 0 0 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px
    }

    .role-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
      justify-content: center
    }

    .role-chips button {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      font-size: 11px;
      font-weight: 700
    }

    /* FAB */
    .fab {
      display: none;
      position: fixed;
      bottom: 20px;
      inset-inline-end: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--info));
      color: #fff;
      font-size: 24px;
      box-shadow: var(--shadow-lg);
      z-index: 30;
      align-items: center;
      justify-content: center
    }

    /* Mobile */
    @media(max-width:980px) {
      .grid.cols-4 {
        grid-template-columns: repeat(2, 1fr)
      }

      .grid.cols-3 {
        grid-template-columns: 1fr
      }

      .grid.cols-2 {
        grid-template-columns: 1fr
      }
    }

    @media(max-width:768px) {
      .sidebar {
        transform: translateX(-100%);
        box-shadow: var(--shadow-lg)
      }

      html[dir="ltr"] .sidebar {
        transform: translateX(-100%)
      }

      html[dir="rtl"] .sidebar {
        transform: translateX(-100%)
      }

      .sidebar.open {
        transform: translateX(0)
      }

      .main {
        margin: 0 !important
      }

      .menu-toggle {
        display: grid
      }

      .fab {
        display: flex
      }

      .grid.cols-4 {
        grid-template-columns: 1fr 1fr
      }

      .content {
        padding: 14px
      }
    }

    .search-box {
      position: relative;
      flex: 1;
      max-width: 380px
    }

    .search-box input {
      padding-inline-start: 38px
    }

    .search-box .ico {
      position: absolute;
      top: 50%;
      inset-inline-start: 12px;
      transform: translateY(-50%);
      color: var(--muted)
    }

    .flex {
      display: flex;
      gap: 10px;
      align-items: center
    }

    .flex.between {
      justify-content: space-between
    }

    .flex.wrap {
      flex-wrap: wrap
    }

    .muted {
      color: var(--muted)
    }

    .text-end {
      text-align: end
    }

    .mt {
      margin-top: 16px
    }

    .mb {
      margin-bottom: 16px
    }

    .hidden {
      display: none !important
    }

    .pill {
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--primary-soft);
      color: var(--primary-2);
      font-weight: 700;
      font-size: 11px
    }

    .category-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 0;
      margin-bottom: 20px;
      scrollbar-width: none;
      /* لإخفاء السكرول في فيرفوكس */
    }

    .category-bar::-webkit-scrollbar {
      display: none;
    }

    /* لإخفاء السكرول في كروم */

    .cat-chip {
      padding: 8px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      white-space: nowrap;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .cat-chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
    }

    /* Print */
    @media print {

      .sidebar,
      .topbar,
      .fab,
      .no-print {
        display: none !important
      }

      .main {
        margin: 0 !important
      }

      .content {
        padding: 0
      }

      body {
        background: #fff;
        color: #000
      }
    }
  </style>
</head>

<body>

  <!-- ============== APP ROOT ============== -->
  <div id="app-root"></div>
  <div id="modal-host"></div>
  <div class="toast-host" id="toast-host"></div>

  <!-- =========================================================
     INTERNAL JAVASCRIPT — Application
========================================================= -->
  <script>
    /* ===========================================================
       1. CONFIG & STATE
    =========================================================== */
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyChUXphmduWh9fCw0krYx_m7xxQX8nzSv0",
      authDomain: "seedyseedy.firebaseapp.com",
      projectId: "seedyseedy",
      storageBucket: "seedyseedy.firebasestorage.app",
      messagingSenderId: "1034684215735",

    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();

    const State = {
      user: null,
      page: 'shop',
      lang: localStorage.getItem('lang') || 'ar',
      theme: localStorage.getItem('theme') || 'light',
      data: {
        users: [], products: [], categories: [], orders: [], customers: [],
        suppliers: [], expenses: [], coupons: [], notifications: [], logs: [],
        warehouses: [], shipments: [],

        // 2. الحفظ في فيرباس (للمزامنة)

      // تحميل البيانات
      async load() {
        // تحميل أولي من المتصفح
        try {
          const localData = JSON.parse(localStorage.getItem(this.KEY));
          if (localData) State.data = localData;
        } catch (e) { }

        // تحميل من فيرباس إذا كان متاحاً
        if (USE_FIREBASE) {
          db.collection('settings').doc('main_data').onSnapshot((doc) => {
            if (doc.exists) {
              State.data = doc.data();

              // إذا كان المستخدم حالياً في صفحة المتجر، أعد رسمه فوراً
              if (State.page === 'shop') {
                renderShop();

    /* ===========================================================
       4. AUTHENTICATION
    =========================================================== */
    const Auth = {
      login(email, pass) {
        const u = State.data.users.find(x => x.email === email && x.pass === pass);
        if (!u) return null;
        State.user = u;
        // Set default page based on role
        const r = ROLES[u.role];
        if (r.pages === '*') State.page = 'dashboard';
        else if (r.pages.includes('dashboard')) State.page = 'dashboard';
        else State.page = r.pages[0];
        localStorage.setItem('session', JSON.stringify({ id: u.id, t: now() }));
        log(u.email, 'تسجيل دخول');
        return u;
      },
      logout() { State.user = null; State.page = 'shop'; localStorage.removeItem('session'); render(); },
      restore() {
        try {
          const s = JSON.parse(localStorage.getItem('session'));
          if (s) { State.user = State.data.users.find(u => u.id === s.id); }
        } catch (e) { }
      },
      can(page) {
        // 1. الصفحات العامة: تظهر دائماً للكل (زائر أو مستخدم)
        if (['shop', 'cart'].includes(page)) return true;

        // 2. إذا لم يكن هناك تسجيل دخول، لا تظهر باقي الصفحات
        if (!State.user) return false;

        // 3. المدير العام (super_admin) يرى كل شيء دائماً
        if (State.user.role === 'super_admin') return true;

        // 4. باقي المستخدمين: حسب الصفحات المحددة لهم
        return State.user.allowedPages && State.user.allowedPages.includes(page);
      }
    };
    function log(user, action) {
      State.data.logs.unshift({ id: uid(), user, action, time: now() });
      Store.save();
    }

      const root = document.getElementById('app-root');

      // إذا كانت الصفحة "shop" أو "cart"، اعرضها دائماً كواجهة عامة
      if (!State.user || State.page === 'shop' || State.page === 'cart') {
        // إذا حاول زائر دخول صفحة إدارية، حوله للمتجر
        if (!State.user && !['shop', 'cart'].includes(State.page)) {
          State.page = 'shop';

        // إذا كان مستخدماً مسجلاً ويريد المتجر، اعرضه داخل إطار المتجر العام أو لوحة التحكم حسب رغبتك
        // هنا سنعرض المتجر بالواجهة العامة لسهولة التصفح
        if (!State.user) {
          root.innerHTML = PublicShell();
          renderPage();
          return;
        }
      }

      // الواجهة الإدارية (لوحة التحكم)
      root.innerHTML = AppShell();
      renderPage();
      bindShell();
    }

        <button class="icon-btn" onclick="toggleLang()" title="اللغة">${State.lang === 'ar' ? 'EN' : 'ع'}</button>
        <button class="icon-btn" onclick="toggleTheme()" title="المظهر">${State.theme === 'dark' ? '☀️' : '🌙'}</button>
        <button class="icon-btn" onclick="showNotifs()" title="الإشعارات">🔔${unread ? `<span class="badge">${unread}</span>` : ''}</button>
      </header>
      <div class="content" id="page"></div>
    </main>
  </div>
  <button class="fab" onclick="quickAction()">+</button>`;
    }
    function pageTitle() {
      for (const g of NAV) for (const i of g.items) if (i.id === State.page) return i.label;
      return '';
    }
    function bindShell() {
      document.querySelectorAll('[data-page]').forEach(a => {
        a.onclick = e => { e.preventDefault(); State.page = a.dataset.page; document.getElementById('sidebar').classList.remove('open'); render(); };
      });
      document.getElementById('menuToggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    }
    function toggleLang() { State.lang = State.lang === 'ar' ? 'en' : 'ar'; localStorage.setItem('lang', State.lang); render(); }
    function toggleTheme() { State.theme = State.theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', State.theme); render(); }
    function quickAction() {
      if (State.page === 'products') openProductForm();
      else if (State.page === 'orders' || State.page === 'pos') State.page = 'pos', render();
      else if (State.page === 'customers') openCustomerForm();
      else State.page = 'pos', render();
    }
    function showNotifs() {
      State.data.notifications.forEach(n => n.read = true); Store.save();
      const list = State.data.notifications.map(n => `
    <div style="padding:12px;border-bottom:1px solid var(--border)">
      <div style="font-weight:700">${n.title}</div>
      <div class="muted" style="font-size:11px;margin-top:2px">${dateStr(n.time)}</div>
    </div>`).join('') || '<div class="muted" style="text-align:center;padding:20px">لا توجد إشعارات</div>';
      modal(`<h2>🔔 الإشعارات</h2>${list}<div class="modal-actions"><button class="btn" onclick="closeModal()">إغلاق</button></div>`);
    }

    /* ===========================================================
       10. PAGE ROUTER
    =========================================================== */
    function renderPage() {
      const el = document.getElementById('page');
      const pages = {
        dashboard: Dashboard, pos: POS, orders: Orders, products: Products, categories: Categories,
        customers: Customers, coupons: Coupons, warehouses: Warehouses, barcode: Barcode,
        shipments: Shipments, 'shipping-calc': ShippingCalc, 'shipping-companies': ShippingCompanies,
        finance: Finance, expenses: Expenses,
        suppliers: Suppliers, commissions: Commissions, whatsapp: WhatsApp, analytics: Analytics,
        users: Users, logs: Logs, settings: Settings, shop: Shop, cart: Cart, 'my-orders': MyOrders
      };
      const fn = pages[State.page] || (() => '<div class="card">صفحة غير موجودة</div>');
      el.innerHTML = fn();
      if (fn.after) fn.after();
    }

    /* ===========================================================
       11. DASHBOARD
    =========================================================== */
    function Dashboard() {
      const orders = State.data.orders;
      const totalSales = orders.reduce((s, o) => s + o.total, 0);
      const today = orders.filter(o => now() - o.date < 86400000);
      const profit = totalSales - State.data.expenses.reduce((s, e) => s + e.amount, 0);
      const lowStock = State.data.products.filter(p => p.stock <= p.minStock).length;
      return `
  <div class="grid cols-4 mb">
    ${kpi('💰', 'إجمالي المبيعات', money(totalSales), '+12%', 'up', 'linear-gradient(135deg,#10b981,#059669)')}
    ${kpi('📦', 'الطلبات اليوم', fmt(today.length), '+8%', 'up', 'linear-gradient(135deg,#0ea5e9,#0284c7)')}
    ${kpi('👥', 'العملاء', fmt(State.data.customers.length), '+5%', 'up', 'linear-gradient(135deg,#6366f1,#4f46e5)')}
    ${kpi('📈', 'الأرباح الصافية', money(profit), profit > 0 ? '+15%' : '-3%', profit > 0 ? 'up' : 'down', 'linear-gradient(135deg,#f59e0b,#d97706)')}
  </div>
  <div class="grid cols-2 mb">
    <div class="card"><h3>المبيعات خلال 7 أيام</h3><canvas id="ch1" height="120"></canvas></div>
    <div class="card"><h3>توزيع الطلبات حسب الحالة</h3><canvas id="ch2" height="120"></canvas></div>
  </div>
  <div class="grid cols-2">
    <div class="card">
      <div class="flex between mb"><h3 style="margin:0">آخر الطلبات</h3><a href="#" onclick="State.page='orders';render()" class="pill">عرض الكل</a></div>
      <div class="table-wrap"><table><thead><tr><th>الكود</th><th>العميل</th><th>المبلغ</th><th>الحالة</th></tr></thead><tbody>
      ${orders.slice(0, 5).map(o => { const c = State.data.customers.find(x => x.id === o.customerId); return `<tr><td><b>${o.code}</b></td><td>${c?.name || '-'}</td><td>${money(o.total)}</td><td><span class="tag ${o.status}">${statusAr(o.status)}</span></td></tr>` }).join('')}
      </tbody></table></div>
    </div>
    <div class="card">
      <h3>⚠️ تنبيهات المخزون (${lowStock})</h3>
      ${State.data.products.filter(p => p.stock <= p.minStock).slice(0, 6).map(p => `
        <div class="flex between" style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div class="flex"><div style="font-size:24px">${p.img}</div><div><div style="font-weight:700">${p.name}</div><div class="muted" style="font-size:11px">SKU: ${p.sku}</div></div></div>
          <div class="text-end"><div style="color:var(--danger);font-weight:800">${p.stock}</div><div class="muted" style="font-size:11px">الحد: ${p.minStock}</div></div>
        </div>`).join('') || '<div class="muted">لا توجد تنبيهات</div>'}
    </div>
  </div>`;
    }
    Dashboard.after = () => {
      const days = Array.from({ length: 7 }, (_, i) => { const d = new Date(now() - 86400000 * (6 - i)); return d.toLocaleDateString('ar-EG', { weekday: 'short' }) });
      const sales = days.map(() => Math.round(1000 + Math.random() * 4000));
      new Chart(document.getElementById('ch1'), { type: 'line', data: { labels: days, datasets: [{ label: 'المبيعات', data: sales, borderColor: '#0ea5e9', backgroundColor: 'rgba(14,165,233,.15)', tension: .4, fill: true }] }, options: { plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false } });
      const counts = {};
      State.data.orders.forEach(o => counts[o.status] = (counts[o.status] || 0) + 1);
      new Chart(document.getElementById('ch2'), { type: 'doughnut', data: { labels: Object.keys(counts).map(statusAr), datasets: [{ data: Object.values(counts), backgroundColor: ['#f59e0b', '#3b82f6', '#8b5cf6', '#06b6d4', '#10b981', '#ef4444', '#64748b'] }] }, options: { responsive: true, maintainAspectRatio: false } });
    };
    function kpi(ic, label, value, delta, dir, bg) { return `<div class="kpi"><div class="ic" style="background:${bg}">${ic}</div><div style="flex:1"><div class="label">${label}</div><div class="value">${value}</div><div class="delta ${dir}">${delta} عن الشهر السابق</div></div></div>` }
    function statusAr(s) { return { pending: 'قيد الانتظار', processing: 'قيد المعالجة', packed: 'تم التغليف', shipped: 'تم الشحن', delivered: 'تم التسليم', returned: 'مرتجع', cancelled: 'ملغي' }[s] || s }

    /* ===========================================================
       12. PRODUCTS
    =========================================================== */
    function Products() {
      return `<div class="card">
    <div class="flex between mb wrap">
      <div class="search-box"><span class="ico">🔍</span><input id="prodSearch" placeholder="بحث بالاسم أو SKU..." oninput="filterProducts()"></div>
      <div class="flex">
        <button class="btn" onclick="exportCSV('products')">📤 تصدير</button>
        <button class="btn" onclick="importExcel()">📥 استيراد Excel</button>
        <button class="btn primary" onclick="openProductForm()">+ منتج جديد</button>
      </div>
    </div>
    <div class="table-wrap"><table><thead><tr>
      <th>المنتج</th><th>SKU</th><th>التصنيف</th><th>التكلفة</th><th>السعر</th><th>الربح</th><th>المخزون</th><th>توقع النفاد</th><th>إجراءات</th>
    </tr></thead><tbody id="prodBody">${prodRows(State.data.products)}</tbody></table></div>
  </div>`;
    }
    function prodRows(list) {
      return list.map(p => {
        const cat = State.data.categories.find(c => c.id === p.cat)?.name || '-';
        const profit = p.price - p.cost;
        const margin = ((profit / p.price) * 100).toFixed(0);
        const days = p.velocity > 0 ? Math.round(p.stock / p.velocity) : '∞';
        const low = p.stock <= p.minStock;
        return `<tr>
      <td><div class="flex"><div style="font-size:26px">${p.img}</div><div><div style="font-weight:700">${p.name}</div><div class="muted" style="font-size:11px">${cat}</div></div></div></td>
      <td><code>${p.sku}</code></td>
      <td>${cat}</td>
      <td>${money(p.cost)}</td>
      <td><b>${money(p.price)}</b></td>
      <td><span style="color:var(--success);font-weight:700">${money(profit)} (${margin}%)</span></td>
      <td>${low ? `<span style="color:var(--danger);font-weight:800">${p.stock} ⚠️</span>` : `<b>${p.stock}</b>`}</td>
      <td><span class="muted">${days} يوم</span></td>
      <td><button class="btn sm" onclick="openProductForm('${p.id}')">تعديل</button> <button class="btn sm danger" onclick="delProduct('${p.id}')">×</button></td>
    </tr>`;
      }).join('') || `<tr><td colspan="9" style="text-align:center;padding:30px" class="muted">لا توجد منتجات</td></tr>`;
    }
    function filterProducts() {
      const q = document.getElementById('prodSearch').value.toLowerCase();
      const list = State.data.products.filter(p => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q));
      document.getElementById('prodBody').innerHTML = prodRows(list);
    }
    // دالة عالمية للتعامل مع حذف الصور لضمان عدم حدوث تداخل في الأكواد
    window.removeProductImg = (index) => {
      window._prodImgs.splice(index, 1);
      refreshImgListUI(); // تحديث الواجهة بعد الحذف
    };

    // دالة لتحديث قائمة الصور في المودال
    function refreshImgListUI() {
      const listEl = document.getElementById('imgList');
      if (!listEl) return;

      listEl.innerHTML = window._prodImgs.map((src, i) => `
      <div style="position:relative;width:70px;height:70px">
        <img src="${src}" style="width:70px;height:70px;object-fit:cover;border-radius:8px;border:1px solid var(--border)" 
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2270%22 height=%2270%22><rect width=%2270%22 height=%2270%22 fill=%22%23eee%22/><text x=%2235%22 y=%2240%22 text-anchor=%22middle%22 font-size=%2220%22>📷</text></svg>'">
        <button type="button" onclick="removeProductImg(${i})" 
                style="position:absolute;top:-6px;inset-inline-end:-6px;background:var(--danger);color:#fff;border-radius:50%;width:20px;height:20px;font-size:12px;display:grid;place-items:center;border:none;cursor:pointer">×</button>
      </div>`).join('');
    }

    function openProductForm(id) {
      const p = id ? State.data.products.find(x => x.id === id) : { img: '📦', cost: 0, price: 0, stock: 0, minStock: 5, images: [], velocity: 1 };

      // تخزين الصور في متغير عالمي مؤقت للتحكم فيها بسهولة
      window._prodImgs = [...(p.images || [])];

      const cats = State.data.categories.map(c => `<option value="${c.id}" ${p.cat === c.id ? 'selected' : ''}>${c.name}</option>`).join('');

      modal(`
    <h2>${id ? 'تعديل' : 'إضافة'} منتج</h2>
    <form id="prodForm">
      <div class="grid cols-2">
        <div class="row"><label>اسم المنتج</label><input name="name" value="${p.name || ''}" required></div>
        <div class="row"><label>SKU</label><input name="sku" value="${p.sku || ''}" required></div>
        <div class="row"><label>التصنيف</label><select name="cat">${cats}</select></div>
        <div class="row"><label>إيموجي (اختياري)</label><input name="img" value="${p.img || '📦'}"></div>
        <div class="row"><label>سعر التكلفة</label><input name="cost" type="number" value="${p.cost}" required></div>
        <div class="row"><label>سعر البيع</label><input name="price" type="number" value="${p.price}" required></div>
        <div class="row"><label>المخزون</label><input name="stock" type="number" value="${p.stock}" required></div>
        <div class="row"><label>حد التنبيه</label><input name="minStock" type="number" value="${p.minStock}"></div>
      </div>
      
      <div class="row" style="margin-top:15px">
        <label>📷 صور المنتج</label>
        <div id="imgList" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px"></div>
        
        <div class="flex" style="gap:8px; margin-bottom:8px">
          <input id="imgUrlInput" placeholder="ضع رابط الصورة هنا..." style="flex:1">
          <button type="button" class="btn" onclick="addNewImgUrl()">+ إضافة رابط</button>
        </div>
        
        <label class="btn" style="cursor:pointer; display:inline-block">
          📁 رفع من الجهاز <input type="file" accept="image/*" multiple style="display:none" onchange="handleFileImgs(this)">
        </label>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn" onclick="closeModal()">إلغاء</button>
        <button class="btn primary">حفظ المنتج</button>
      </div>
    </form>
  `);

      // تشغيل عرض الصور لأول مرة
      refreshImgListUI();

      // دوال داخلية للتعامل مع الإضافة
      window.addNewImgUrl = () => {
        const inp = document.getElementById('imgUrlInput');
        if (inp.value.trim()) {
          window._prodImgs.push(inp.value.trim());
          inp.value = '';
          refreshImgListUI();
        }
      };

      window.handleFileImgs = (input) => {
        Array.from(input.files).forEach(file => {
          const reader = new FileReader();
          reader.onload = e => {
            window._prodImgs.push(e.target.result);
            refreshImgListUI();
          };
          reader.readAsDataURL(file);
        });
      };

      // عند حفظ النموذج
      document.getElementById('prodForm').onsubmit = e => {
        e.preventDefault();
        const fd = Object.fromEntries(new FormData(e.target));
        // تحويل الأرقام
        fd.cost = Number(fd.cost);
        fd.price = Number(fd.price);
        fd.stock = Number(fd.stock);
        fd.minStock = Number(fd.minStock);
        fd.images = [...window._prodImgs]; // حفظ الصور من المصفوفة المؤقتة
        fd.velocity = p.velocity || 1;

        if (id) {
          Object.assign(p, fd);
        } else {
          State.data.products.push({ id: uid(), ...fd });
        }

        Store.save();
        closeModal();
        render(); // إعادة بناء صفحة المنتجات
        toast('تم حفظ المنتج بنجاح ✅', 'success');
      };
    }

    function delProduct(id) { if (confirm('حذف المنتج؟')) { State.data.products = State.data.products.filter(p => p.id !== id); Store.save(); render(); toast('تم الحذف', 'success'); } }
    function importExcel() { toast('استيراد Excel - رفع الملف', 'info'); }
    function exportCSV(key) {
      const data = State.data[key]; if (!data?.length) return toast('لا توجد بيانات', 'warning');
      const headers = Object.keys(data[0]);
      const csv = [headers.join(','), ...data.map(r => headers.map(h => JSON.stringify(r[h] ?? '')).join(','))].join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = key + '.csv'; a.click();
      toast('تم التصدير', 'success');
    }

    /* ===========================================================
       13. POS — Quick Order
    =========================================================== */
    let cart = [];
    function POS() {
      const govOpts = GOVS.map(g => `<option>${g}</option>`).join('');
      return `<div class="grid cols-2">
    <div class="card">
      <h3>🛍️ المنتجات</h3>
      <div class="search-box mb"><span class="ico">🔍</span><input id="posSearch" placeholder="ابحث أو امسح باركود..." oninput="renderPosList()"></div>
      <div id="posList" class="grid cols-3" style="gap:10px;max-height:500px;overflow:auto"></div>
    </div>
    <div class="card">
      <h3>🧾 الفاتورة الحالية</h3>
      <div class="row mb">
        <label>📱 هاتف العميل (للتعرف الفوري)</label>
        <input id="cusPhone" placeholder="01xxxxxxxxx" oninput="autoFillCustomer()">
      </div>
      <div class="grid cols-2" style="gap:8px">
        <div class="row mb"><label>الاسم</label><input id="cusName" placeholder="اسم العميل"></div>
        <div class="row mb"><label>📱 هاتف 2</label><input id="cusPhone2" placeholder="اختياري"></div>
      </div>
      <div class="row mb"><label>المحافظة</label>
        <select id="cusGov">${govOpts}</select>
      </div>
      <div class="row mb"><label>العنوان التفصيلي</label>
        <textarea id="cusAddress" rows="2" style="resize:vertical" placeholder="الشارع، المبنى، الشقة..."></textarea>
      </div>
      <div id="cartList" style="max-height:200px;overflow:auto;border-top:1px solid var(--border);padding-top:10px"></div>
      <div id="cartTotals" class="mt"></div>
      <div class="row mt" style="background:var(--primary-soft);border-radius:10px;padding:12px">
        <label style="color:var(--primary-2);font-weight:800">💵 عربون / دفعة مقدمة (ج.م)</label>
        <input id="posDeposit" type="number" min="0" value="0" placeholder="0" style="margin-top:6px">
      </div>
      <button class="btn primary" style="width:100%;justify-content:center;margin-top:10px;padding:12px" onclick="checkout()">إتمام البيع 💳</button>
    </div>
  </div>`;
    }
    POS.after = () => { renderPosList(); renderCart(); };
    function renderPosList() {
      const q = document.getElementById('posSearch')?.value.toLowerCase() || '';
      const list = State.data.products.filter(p => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q));
      document.getElementById('posList').innerHTML = list.map(p => `
    <button class="card" style="padding:10px;text-align:center;cursor:pointer" onclick="addToCart('${p.id}')">
      <div style="font-size:34px">${p.img}</div>
      <div style="font-weight:700;font-size:12px;margin-top:4px">${p.name}</div>
      <div style="color:var(--primary);font-weight:800;margin-top:4px">${money(p.price)}</div>
      <div class="muted" style="font-size:10px">المتاح: ${p.stock}</div>
    </button>`).join('');
    }
    function addToCart(pid) {
      const p = State.data.products.find(x => x.id === pid);
      const it = cart.find(c => c.pid === pid);
      if (it) it.qty++; else cart.push({ pid, name: p.name, price: p.price, qty: 1 });
      renderCart();
    }
    function renderCart() {
      const list = document.getElementById('cartList'); if (!list) return;
      list.innerHTML = cart.map((c, i) => `
    <div class="flex between" style="padding:8px 0;border-bottom:1px dashed var(--border)">
      <div style="flex:1"><div style="font-weight:700;font-size:13px">${c.name}</div><div class="muted" style="font-size:11px">${money(c.price)} × ${c.qty}</div></div>
      <div class="flex">
        <button class="btn sm" onclick="cart[${i}].qty=Math.max(1,cart[${i}].qty-1);renderCart()">−</button>
        <span style="font-weight:800">${c.qty}</span>
        <button class="btn sm" onclick="cart[${i}].qty++;renderCart()">+</button>
        <button class="btn sm danger" onclick="cart.splice(${i},1);renderCart()">×</button>
      </div>
    </div>`).join('') || '<div class="muted" style="text-align:center;padding:20px">السلة فارغة</div>';
      const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
      const ship = sub > 0 ? 50 : 0;
      const deposit = +document.getElementById('posDeposit')?.value || 0;
      const remaining = sub + ship - deposit;
      document.getElementById('cartTotals').innerHTML = `
    <div class="flex between" style="padding:6px 0"><span class="muted">الإجمالي الفرعي</span><b>${money(sub)}</b></div>
    <div class="flex between" style="padding:6px 0"><span class="muted">الشحن</span><b>${money(ship)}</b></div>
    ${deposit > 0 ? `<div class="flex between" style="padding:6px 0"><span class="muted" style="color:var(--success)">عربون مدفوع</span><b style="color:var(--success)">- ${money(deposit)}</b></div>` : ''}
    <div class="flex between" style="padding:10px 0;border-top:2px solid var(--border);font-size:18px"><b>الإجمالي</b><b style="color:var(--primary)">${money(sub + ship)}</b></div>
    ${deposit > 0 ? `<div class="flex between" style="padding:6px 0;background:var(--primary-soft);border-radius:8px;padding:8px 12px"><b style="color:var(--primary-2)">المتبقي</b><b style="color:var(--danger)">${money(remaining)}</b></div>` : ''}`;
    }
    function autoFillCustomer() {
      const phone = document.getElementById('cusPhone').value;
      const c = State.data.customers.find(x => x.phone === phone || x.phone2 === phone);
      if (c) {
        document.getElementById('cusName').value = c.name || '';
        document.getElementById('cusPhone2').value = c.phone2 || '';
        const govSel = document.getElementById('cusGov');
        if (govSel) govSel.value = c.gov || 'القاهرة';
        const addrEl = document.getElementById('cusAddress');
        if (addrEl) addrEl.value = c.address || '';
        toast('تم التعرف على العميل: ' + c.name + ' ✅', 'success');
      }
    }
    function checkout() {
      if (!cart.length) return toast('السلة فارغة', 'warning');
      const phone = document.getElementById('cusPhone').value;
      const phone2 = document.getElementById('cusPhone2')?.value || '';
      const name = document.getElementById('cusName').value || 'عميل عابر';
      const gov = document.getElementById('cusGov').value;
      const address = document.getElementById('cusAddress')?.value || '';
      const deposit = +document.getElementById('posDeposit')?.value || 0;
      let cu = State.data.customers.find(x => x.phone === phone || (phone && x.phone2 === phone));

      else if (phone) { cu = { id: uid(), name, phone, phone2, gov, address, points: 0, total: 0 }; State.data.customers.push(cu); }
      const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
      const ship = 50;
      const order = { id: uid(), code: 'ORD-' + (1000 + State.data.orders.length + 1), customerId: cu?.id, items: cart.map(c => ({ pid: c.pid, qty: c.qty, price: c.price })), total: sub + ship, status: 'pending', gov, address, shipping: ship, date: now(), salesman: State.user.id, paid: deposit, deposit };
      State.data.orders.unshift(order);
      cart.forEach(c => { const p = State.data.products.find(x => x.id === c.pid); if (p) p.stock -= c.qty; });
      if (cu) { cu.points += Math.floor(sub / 10); cu.total = (cu.total || 0) + sub; }
      State.data.notifications.unshift({ id: uid(), title: 'طلب جديد ' + order.code, time: now(), read: false });
      log(State.user.email, 'إنشاء طلب ' + order.code);
      cart = []; Store.save(); toast('تم إنشاء الطلب ' + order.code + (deposit > 0 ? ` | عربون: ${money(deposit)}` : ''), 'success'); render();

    function exportCustomersExcel() {
      const headers = ['الاسم', 'الهاتف الأول', 'الهاتف الثاني', 'المحافظة', 'العنوان', 'VIP', 'نقاط الولاء', 'إجمالي المشتريات'];
      const rows = State.data.customers.map(c => [c.name, c.phone || '', c.phone2 || '', c.gov || '', c.address || '', c.vip ? 'نعم' : 'لا', c.points || 0, c.total || 0]);
      const csv = [headers.join(','), ...rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(','))].join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'العملاء.csv'; a.click();
      toast('تم تصدير بيانات العملاء', 'success');
    }
    function importCustomersExcel(input) {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const text = e.target.result;
        const lines = text.split('\n').filter(l => l.trim());
        let imported = 0;
        lines.slice(1).forEach(line => {
          const cols = line.split(',').map(c => c.replace(/^"|"$/g, '').replace(/""/g, '"').trim());
          if (!cols[0]) return;
          const existing = State.data.customers.find(c => c.phone === cols[1]);
          if (existing) { Object.assign(existing, { name: cols[0] || existing.name, phone: cols[1] || existing.phone, phone2: cols[2] || existing.phone2 || '', gov: cols[3] || existing.gov || '', address: cols[4] || existing.address || '', vip: cols[5] === 'نعم' }); }
          else { State.data.customers.push({ id: uid(), name: cols[0], phone: cols[1] || '', phone2: cols[2] || '', gov: cols[3] || 'القاهرة', address: cols[4] || '', vip: cols[5] === 'نعم', points: +cols[6] || 0, total: +cols[7] || 0 }); imported++; }
        });
        Store.save(); render(); toast(`تم استيراد ${imported} عميل جديد`, 'success');
      };
      reader.readAsText(file, 'UTF-8');
      input.value = '';
    }

    function Finance() {
      const sales = State.data.orders.reduce((s, o) => s + o.total, 0);
      const cogs = State.data.orders.reduce((s, o) => s + o.items.reduce((a, it) => { const p = State.data.products.find(x => x.id === it.pid); return a + (p ? p.cost * it.qty : 0) }, 0), 0);
      const exp = State.data.expenses.reduce((s, e) => s + e.amount, 0);
      const profit = sales - cogs - exp;
      return `<div class="grid cols-4 mb">
    ${kpi('💰', 'المبيعات', money(sales), '+12%', 'up', '#10b981')}
    ${kpi('📦', 'تكلفة البضاعة', money(cogs), '-', 'up', '#0ea5e9')}
    ${kpi('💸', 'المصروفات', money(exp), '-', 'down', '#ef4444')}
    ${kpi('📈', 'صافي الربح', money(profit), profit > 0 ? '+15%' : '-', 'up', '#6366f1')}

        closeModal();
        render();
        toast('تم تحديث المستخدم وصلاحياته بنجاح', 'success');
      };
    }

    function deleteUser(id) {
      if (confirm('هل أنت متأكد من حذف هذا المستخدم؟')) {
        State.data.users = State.data.users.filter(u => u.id !== id);
        Store.save();
        render();
      }
    }
    function Logs() {
      return `<div class="card"><h3>📜 سجل النشاط والتدقيق الأمني</h3>
    <div class="table-wrap"><table><thead><tr><th>المستخدم</th><th>الإجراء</th><th>التاريخ</th></tr></thead><tbody>
    ${State.data.logs.slice(0, 50).map(l => `<tr><td>${l.user}</td><td>${l.action}</td><td>${dateStr(l.time)} ${new Date(l.time).toLocaleTimeString('ar-EG')}</td></tr>`).join('')}
    </tbody></table></div></div>`;
    }
    function Settings() {
      return `<div class="card" style="max-width:600px">
    <h3>⚙️ الإعدادات</h3>
    <div class="row"><label>اللغة</label><select onchange="State.lang=this.value;localStorage.setItem('lang',this.value);render()">
      <option value="ar" ${State.lang === 'ar' ? 'selected' : ''}>العربية</option><option value="en" ${State.lang === 'en' ? 'selected' : ''}>English</option></select></div>
    <div class="row"><label>المظهر</label><select onchange="State.theme=this.value;localStorage.setItem('theme',this.value);render()">
      <option value="light" ${State.theme === 'light' ? 'selected' : ''}>فاتح</option><option value="dark" ${State.theme === 'dark' ? 'selected' : ''}>داكن</option></select></div>
    <div class="row"><label>قاعدة البيانات</label>
      <div class="card" style="background:var(--surface-2)"><b>${USE_FIREBASE ? '☁️ Firebase Cloud' : '💾 LocalStorage (وضع محلي)'}</b>
      <p class="muted" style="margin:6px 0 0;font-size:12px">لتفعيل المزامنة السحابية، عدّل FIREBASE_CONFIG في الكود</p></div></div>
    <div class="row"><button class="btn danger" onclick="if(confirm('إعادة ضبط جميع البيانات؟')){Store.reset();render();toast('تم إعادة الضبط','warning');}">🗑️ إعادة ضبط البيانات التجريبية</button></div>
    <div class="row"><button class="btn" onclick="exportCSV('orders')">📤 تصدير الطلبات CSV</button></div>
  </div>`;
    }

    /* ===========================================================
       22. PUBLIC SHOP / CART / MY-ORDERS (Customer view)
    =========================================================== */
    // متغير عالمي لحفظ الفئة المختارة في المتجر
    // تأكد من وجود المتغير العالمي في بداية السكريبت
    function Shop() {
      // تعيين الفئة الافتراضية عند فتح الصفحة
      window.shopCategory = window.shopCategory || 'all';

      return `
    <div class="card mb">
      <div class="flex between wrap" style="gap:15px">
        <h3 style="margin:0">🛍️ المتجر الإلكتروني</h3>
        <div class="search-box" style="flex:1; max-width:300px">
          <span class="ico">🔍</span>
          <input id="shopS" type="text" placeholder="ابحث عن منتج..." oninput="renderShop()">
        </div>
      </div>
    </div>
    <div class="category-bar" id="shopCats" style="display:flex; gap:10px; overflow-x:auto; padding:10px 0; margin-bottom:15px"></div>
    <div class="grid cols-4" id="shopGrid"></div>
  `;
    }

    function renderShop() {
      // نضع الكود داخل setTimeout لضمان أن العناصر (shopGrid و shopS) أصبحت موجودة فعلياً في المتصفح
      setTimeout(() => {
        const grid = document.getElementById('shopGrid');
        const catBar = document.getElementById('shopCats');
        const searchInput = document.getElementById('shopS');

        if (!grid) return;

        const products = State.data.products || [];
        const categories = State.data.categories || [];

        // تأكد من قراءة قيمة البحث بشكل صحيح أو جعلها فارغة
        const q = searchInput ? searchInput.value.toLowerCase() : '';

        // 1. رسم الفئات
        const allCats = [{ id: 'all', name: 'الكل' }, ...categories];
        if (catBar) {
          catBar.innerHTML = allCats.map(c => `
        <div class="cat-chip ${window.shopCategory === c.id ? 'active' : ''}" 
             style="padding:8px 18px; cursor:pointer; border-radius:20px; border:1px solid var(--border); white-space:nowrap; 
             background:${window.shopCategory === c.id ? 'var(--primary)' : 'var(--surface)'}; 
             color:${window.shopCategory === c.id ? 'white' : 'var(--text)'}"
             onclick="filterShopByCat('${c.id}')">
          ${c.name}
        </div>
      `).join('');
        }

        // 2. فلترة المنتجات (تم تحسين المنطق هنا ليكون أكثر مرونة)
        const list = products.filter(p => {
          const name = p.name ? p.name.toLowerCase() : '';
          const matchesSearch = name.includes(q);
          const matchesCat = (window.shopCategory === 'all' || p.cat === window.shopCategory);
          return matchesSearch && matchesCat;
        });

        // 3. عرض النتائج
        if (list.length === 0) {
          grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px" class="muted">لا توجد منتجات للعرض</div>`;
        } else {
          grid.innerHTML = list.map(p => {
            const cartItem = cart.find(c => c.pid === p.id);
            const currentQty = cartItem ? cartItem.qty : 0;
            const firstImg = (p.images && p.images.length) ? p.images[0] : null;

            return `
          <div class="card" style="text-align:center; padding:12px;">
            <div onclick="showProductDetails('${p.id}')" style="cursor:pointer">
              ${firstImg ? `<img src="${firstImg}" style="width:100%;height:160px;object-fit:cover;border-radius:10px;">`
                : `<div style="font-size:60px; background:var(--surface-2); border-radius:10px; height:160px; display:grid; place-items:center">${p.img || '📦'}</div>`}
            </div>
            <div style="font-weight:800;margin-top:8px;font-size:13px;height:38px;overflow:hidden">${p.name}</div>
            <div style="color:var(--primary);font-weight:900;font-size:16px;margin:5px 0">${money(p.price)}</div>
            <div class="qty-auto-control">
              <div class="qty-btn-circle minus" onclick="updateAutoCart('${p.id}', -1)">−</div>
              <div class="qty-val">${currentQty}</div>
              <div class="qty-btn-circle" onclick="updateAutoCart('${p.id}', 1)">+</div>
            </div>
          </div>`;
          }).join('');
        }

        // رسم الزر العائم للسلة
        renderFloatingCart();
      }, 10);
    }

    // دالة منفصلة لرسم زر السلة العائم لضمان عدم التكرار
    function renderFloatingCart() {
      const totalInCart = cart.reduce((s, c) => s + c.qty, 0);
      const existingFloatingCart = document.querySelector('.floating-cart');
      if (existingFloatingCart) existingFloatingCart.remove();

      if (totalInCart > 0) {
        const cartTotalMoney = cart.reduce((s, c) => s + c.price * c.qty, 0);
        const html = `
            <div class="floating-cart" onclick="State.page='cart';render()" style="position: fixed; bottom: 85px; inset-inline-end: 20px; background: #10b981; color: #fff; padding: 12px 25px; border-radius: 50px; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 10px; font-weight: bold; z-index: 1000; cursor: pointer;">
                🛒 السلة (${totalInCart}) - ${money(cartTotalMoney)}
            </div>`;
        document.body.insertAdjacentHTML('beforeend', html);
      }
    }

    // دالة الفلترة
    window.filterShopByCat = (catId) => {
      window.shopCategory = catId;
      renderShop();
    };

    // دالة إصلاح البيانات إذا كان الفيرباس فارغاً
    window.seedAndSaveDemo = () => {
      seedDemo(); // استدعاء الدالة التي تملأ State.data بالبيانات الافتراضية
      Store.save(); // حفظها في فيرباس
      render(); // إعادة التشغيل
      toast("تم استعادة البيانات التجريبية بنجاح", "success");
    };

    function addToCartQty(pid) {
      const qty = parseInt(document.getElementById('qty_' + pid)?.value || 1);
      const p = State.data.products.find(x => x.id === pid);
      const it = cart.find(c => c.pid === pid);
      if (it) it.qty += qty; else cart.push({ pid, name: p.name, price: p.price, qty });
      toast('أُضيف للسلة 🛒', 'success');
    }
    function Cart() {
      if (!cart.length) return `<div class="card" style="text-align:center;padding:60px"><div style="font-size:60px">🛒</div><h3>السلة فارغة</h3><button class="btn primary" onclick="State.page='shop';render()">تسوق الآن</button></div>`;
      const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
      return `<div class="card"><h3>🛒 سلة التسوق</h3>
    ${cart.map((c, i) => `<div class="flex between" style="padding:14px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1"><b>${c.name}</b><div class="muted">${money(c.price)}</div></div>
      <div class="flex">
        <button class="btn sm" onclick="cart[${i}].qty=Math.max(1,cart[${i}].qty-1);render()">−</button>
        <b>${c.qty}</b>
        <button class="btn sm" onclick="cart[${i}].qty++;render()">+</button>
        <button class="btn sm danger" onclick="cart.splice(${i},1);render()">×</button>
      </div></div>`).join('')}
    <div style="font-size:20px;text-align:end;margin-top:14px"><b>الإجمالي: ${money(sub + 50)}</b></div>
    <button class="btn primary" style="width:100%;justify-content:center;padding:14px;margin-top:14px" onclick="checkoutCustomer()">إتمام الشراء</button></div>`;
    }
    function checkoutCustomer() {
      const u = State.user;
      let cu = State.data.customers.find(x => x.phone === u.email);
      if (!cu) { cu = { id: uid(), name: u.name, phone: u.email, gov: 'القاهرة', points: 0, total: 0 }; State.data.customers.push(cu); }
      const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
      const order = { id: uid(), code: 'ORD-' + (1000 + State.data.orders.length + 1), customerId: cu.id, items: cart.map(c => ({ pid: c.pid, qty: c.qty, price: c.price })), total: sub + 50, status: 'pending', gov: cu.gov, shipping: 50, date: now(), paid: 0 };
      State.data.orders.unshift(order); cart = []; Store.save(); toast('تم تأكيد طلبك ' + order.code, 'success'); State.page = 'my-orders'; render();
    }
    function MyOrders() {
      const u = State.user;
      const cu = State.data.customers.find(x => x.phone === u.email);
      const ords = cu ? State.data.orders.filter(o => o.customerId === cu.id) : [];
      return `<div class="card"><h3>📦 طلباتي</h3>
    ${ords.map(o => `<div class="card" style="margin-top:10px"><div class="flex between">
      <div><b>${o.code}</b><div class="muted">${dateStr(o.date)}</div></div>
      <div class="text-end"><b>${money(o.total)}</b><div><span class="tag ${o.status}">${statusAr(o.status)}</span></div></div>
    </div></div>`).join('') || '<div class="muted" style="text-align:center;padding:40px">لا توجد طلبات</div>'}
  </div>`;
    }

    // وظائف مساعدة للمعرض والزوم
    window.changeMainImg = (el, src) => {
      document.getElementById('productMainImg').src = src;
      document.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    };

    window.zoomImg = (e) => {
      const img = document.getElementById('productMainImg');
      if (!img) return;
      const { left, top, width, height } = e.currentTarget.getBoundingClientRect();
      const x = ((e.pageX - left - window.scrollX) / width) * 100;
      const y = ((e.pageY - top - window.scrollY) / height) * 100;
      img.style.transformOrigin = `${x}% ${y}%`;
    };

    window.resetZoom = () => {
      const img = document.getElementById('productMainImg');
      if (img) img.style.transformOrigin = `center center`;
    };

    window.addToCartFromDetail = (pid) => {
      const qty = parseInt(document.getElementById('detailQty').value || 1);
      const p = State.data.products.find(x => x.id === pid);
      const it = cart.find(c => c.pid === pid);
      if (it) it.qty += qty; else cart.push({ pid, name: p.name, price: p.price, qty });
      closeModal();
      toast('تمت الإضافة للسلة', 'success');
      render(); // لتحديث العداد في الصفحة الرئيسية
    };

    /* ===========================================================
       23. BOOTSTRAP
    =========================================================== */
    // بدلاً من السطر القديم، استخدم هذا:
    Store.load().then(() => {
      Auth.restore();
      render();
    });

    /* PWA service worker registration (inline) */
    if ('serviceWorker' in navigator) {
      const swCode = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)))});`;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => { });
    }

    /* Firebase placeholder — when you add real config:
       import { initializeApp } from 'firebase/app';
       import { getAuth, ... } from 'firebase/auth';
       import { getFirestore, onSnapshot, ... } from 'firebase/firestore';
       const app = initializeApp(FIREBASE_CONFIG);
       ... wire onSnapshot to State.data and call render()
    */
    function showProductDetails(pid) {
      const p = State.data.products.find(x => x.id === pid);
      if (!p) return;

      const images = p.images && p.images.length ? p.images : [];
      const mainImgSrc = images.length ? images[0] : '';

      const thumbnailsHtml = images.map((img, i) => `
    <img src="${img}" class="thumb-item ${i === 0 ? 'active' : ''}" 
         style="width:60px; height:60px; object-fit:cover; border-radius:8px; cursor:pointer; border:2px solid ${i === 0 ? 'var(--primary)' : 'transparent'}" 
         onclick="changeMainImg(this, '${img}')">
  `).join('');

      modal(`
    <div class="grid cols-2" style="gap:20px; align-items: start;">
      <div class="product-gallery" style="display:flex; flex-direction:column; gap:10px">
        <div class="main-img-container" id="mainImgFrame" 
             style="width: 100%; height: 300px; overflow: hidden; border-radius: 14px; border: 1px solid var(--border); position: relative; cursor: zoom-in;"
             onmousemove="zoomImg(event)" onmouseleave="resetZoom()">
          ${mainImgSrc ? `<img src="${mainImgSrc}" id="productMainImg" style="width:100%; height:100%; object-fit:contain; transition: transform 0.3s ease;">` : `<div style="font-size:120px;text-align:center;padding:40px">${p.img}</div>`}
        </div>
        <div class="thumb-list" style="display:flex; gap:8px; overflow-x:auto; padding:5px 0;">${thumbnailsHtml}</div>
      </div>
      <div>
        <h2 style="margin:0 0 10px 0">${p.name}</h2>
        <span class="pill">${State.data.categories.find(c => c.id === p.cat)?.name || 'عام'}</span>
        <div style="font-size:28px; font-weight:900; color:var(--primary); margin:20px 0">
          ${money(p.price)}
        </div>
        <div style="margin-bottom:20px">
          <label style="display:block; font-weight:bold; margin-bottom:5px">الكمية المطلوبة:</label>
          <input type="number" id="detailQty" value="1" min="1" style="width:100px">
        </div>
        <button class="btn primary" style="width:100%; justify-content:center; padding:15px; font-size:16px" 
                onclick="addToCartFromDetail('${p.id}')">🛒 إضافة إلى السلة</button>
      </div>
    </div>
  `);
    }

    // وظيفة تبديل الصورة الرئيسية
    window.changeMainImg = (el, src) => {
      const mainImg = document.getElementById('productMainImg');
      if (mainImg) mainImg.src = src;
      document.querySelectorAll('.thumb-item').forEach(t => t.style.borderColor = 'transparent');
      el.style.borderColor = 'var(--primary)';
    };

    // وظيفة الزوم (Zoom)
    window.zoomImg = (e) => {
      const img = document.getElementById('productMainImg');
      if (!img) return;
      const { left, top, width, height } = e.currentTarget.getBoundingClientRect();
      const x = ((e.pageX - left - window.scrollX) / width) * 100;
      const y = ((e.pageY - top - window.scrollY) / height) * 100;
      img.style.transformOrigin = `${x}% ${y}%`;
      img.style.transform = "scale(2)";
    };

    window.resetZoom = () => {
      const img = document.getElementById('productMainImg');
      if (img) {
        img.style.transform = "scale(1)";
        img.style.transformOrigin = `center center`;
      }
    };

    window.addToCartFromDetail = (pid) => {
      const qty = parseInt(document.getElementById('detailQty').value || 1);
      const p = State.data.products.find(x => x.id === pid);
      const it = cart.find(c => c.pid === pid);
      if (it) it.qty += qty; else cart.push({ pid, name: p.name, price: p.price, qty });
      closeModal();
      toast('تمت الإضافة للسلة ✅', 'success');
      render();
    };

    window.updateAutoCart = (pid, delta) => {
      const p = State.data.products.find(x => x.id === pid);
      if (!p) return;

      let it = cart.find(c => c.pid === pid);

      if (it) {
        it.qty += delta;
        if (it.qty <= 0) {
          cart = cart.filter(c => c.pid !== pid);
        }
      } else if (delta > 0) {
        cart.push({ pid: p.id, name: p.name, price: p.price, qty: 1 });
      }

      // حفظ وتحديث الواجهة فوراً
      Store.save();
      renderShop(); // نقوم بتحديث جزء المتجر فقط ليكون أسرع من تحديث التطبيق بالكامل

      // إذا أردت تحديث عداد السلة في التوب بار أيضاً:
      const cartBadge = document.querySelector('.topbar .badge');
      if (cartBadge) {
        const total = cart.reduce((s, c) => s + c.qty, 0);
        cartBadge.textContent = total;
        cartBadge.style.display = total > 0 ? 'block' : 'none';
      }
    };

  </script>
</body>

</html>
